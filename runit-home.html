<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>runit — Home</title>
  <script>if (location.protocol !== 'file:') { document.write('<link rel="manifest" href="./manifest.json">') }</script>
  <meta name="theme-color" content="#202020">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="runit">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./transitions.js"></script>
  <style>
    /* 홈 전용: phone-inner overflow visible (FAB, 월 모달 드롭다운용) */
    .phone-inner {
      overflow: visible;
    }

    .dynamic-island {
      display: none;
      /* 실제 기기에서는 OS가 처리 */
    }



    /* ─── Screen system ───────────────────── */
    .screen {
      display: none;
      flex: 1;
      overflow: hidden;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 22px 32px;
      scrollbar-width: none;
    }

    .scroll-area::-webkit-scrollbar {
      display: none;
    }

    /* ─── Header ──────────────────────────── */
    .s-header {
      padding: 28px 22px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    /* Profile row */
    .profile-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-avatar {
      width: 34px;
      height: 34px;
      border-radius: 0;
      background: var(--surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-avatar-fallback {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-2);
      letter-spacing: 0;
      line-height: 1;
      transition: color 0.3s;
    }

    .profile-id {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: 0;
      transition: color 0.3s;
    }

    /* ─── Hero mileage row ───────────────── */
    .hero-row {
      padding: 0 22px 0;
      margin-top: auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      cursor: pointer;
    }

    .hero-date {
      padding-bottom: 10px;
    }

    .header-month {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: 0;
      line-height: 1;
      transition: color 0.3s;
    }

    .header-year {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-2);
      margin-top: 3px;
      transition: color 0.3s;
    }

    /* ─── Weather Widget ─────────────────── */
    .weather-widget {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      font-family: 'Space Grotesk', sans-serif;
      text-align: right;
    }

    .weather-top {
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1;
    }

    .weather-temp {
      font-size: 20px;
      font-weight: 500;
      color: var(--text-1);
    }

    .weather-desc {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-2);
    }

    .weather-bottom {
      display: flex;
      gap: 8px;
      font-size: 11px;
      color: var(--text-3);
      font-weight: 500;
    }

    .weather-pm-val {
      font-weight: 700;
    }

    .weather-pm-label {
      opacity: 0.8;
      margin-right: 2px;
    }

    .pm-good {
      color: #00b894;
    }

    .pm-moderate {
      color: #e1b12c;
    }

    .pm-bad {
      color: #e17055;
    }

    .hero-km {
      font-size: 68px;
      font-weight: 900;
      color: var(--text-1);
      letter-spacing: 0;
      line-height: 1;
      transition: color 0.3s;
    }

    .hero-km .km-unit {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-2);
      margin-left: 2px;
    }

    /* ─── New hero section (vertical layout) ────── */
    .hero-section {
      padding: calc(env(safe-area-inset-top, 0px) + 20px) 20px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .hero-title-line {
      font-size: 24px;
      font-weight: 300;
      color: var(--text-1);
      letter-spacing: 0em;
      line-height: 1.5;
      transition: color 0.3s;
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
    }

    .hero-km-row {
      padding: 4px 22px 0;
      display: flex;
      align-items: baseline;
      gap: 4px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .hero-km-big {
      font-size: 72px;
      font-weight: 300;
      color: var(--text-1);
      letter-spacing: -2px;
      line-height: 1;
      transition: color 0.3s;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      text-decoration: underline;
      text-decoration-color: var(--text-1);
      text-underline-offset: 14px;
      text-decoration-thickness: 2px;
    }

    .hero-km-unit {
      font-size: 20px;
      font-weight: 300;
      color: var(--text-2);
      letter-spacing: 0;
      transition: color 0.3s;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
    }

    /* ─── Bottom Nav ──────────────────────────── */
    .bottom-nav {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 26px 10px;
      flex-shrink: 0;
    }

    .bottom-nav-icon {
      cursor: pointer;
      opacity: 0.75;
    }

    /* ─── Calendar ────────────────────────── */
    .calendar {
      overflow: hidden;
    }

    .cal-slide-wrap {
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.28s ease;
    }

    .cal-slide-wrap.slide-out-left {
      transform: translateX(-32px);
      opacity: 0;
    }

    .cal-slide-wrap.slide-out-right {
      transform: translateX(32px);
      opacity: 0;
    }

    .cal-slide-wrap.slide-in-left {
      transform: translateX(32px);
      opacity: 0;
    }

    .cal-slide-wrap.slide-in-right {
      transform: translateX(-32px);
      opacity: 0;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .cal-nav-btn {
      width: 28px;
      height: 28px;
      border-radius: 0;
      background: var(--surface-1);
      border: none;
      color: var(--text-2);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      transition: background 0.3s, color 0.3s;
    }

    .cal-month-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: 0;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 12px;
      padding: 0 22px;
    }

    .cal-wd {
      text-align: center;
      font-size: 12pt;
      font-weight: 300;
      color: var(--cloudy-gray);
      /* 평일: 다크그레이*/
      padding: 4px 0;
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
    }

    /* 일(첫번째), 토(마지막): 하양 */
    .cal-wd:first-child,
    .cal-wd:last-child {
      color: var(--slate-gray);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      padding: 0 22px;
    }

    /* ─── Calendar day cell ───────────────── */
    .cal-day {
      border-radius: 100px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    .cal-day:active {
      opacity: 0.7;
      transform: scale(0.94);
    }

    .day-num {
      font-size: 14px;
      font-weight: 300;
      line-height: 1;
      color: #ffffff;
      display: none;
    }

    .day-note {
      font-size: 16px;
      font-weight: 600;
      color: inherit;
      line-height: 1;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Today indicator dot */
    .cal-day.today::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 0;
      background: currentColor;
      opacity: 0.5;
    }

    /* ── Type styles (fixed colors) ── */
    /* Race */
    .type-race {
      background: var(--type-race-bg);
      color: var(--type-race-text);
    }

    /* Time Trial */
    .type-tt {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    /* Tempo */
    .type-tempo {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    /* Interval */
    .type-interval {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    /* Steady */
    .type-steady {
      background: var(--type-steady-bg);
      color: var(--type-steady-text);
    }

    /* Easy */
    .type-easy {
      background: var(--type-easy-bg);
      color: var(--type-easy-text);
    }

    /* Jogging */
    .type-jogging {
      background: var(--type-jog-bg);
      color: var(--type-jog-text);
    }

    /* Long */
    .type-long {
      background: var(--type-long-bg);
      color: var(--type-long-text);
    }

    /* No training (past) */
    .type-none {
      background: transparent;
      color: var(--type-none-border);
      cursor: default;
      box-shadow: inset 0 0 0 1.5px var(--type-none-border);
      border: #ffffff 1px solid;
      opacity: 0.1;
    }

    /* Future */
    .type-future {
      background: transparent;
      color: var(--text-3);
    }

    /* ─── Cal-area + activity list layout ──── */
    #s1-home {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 캘린더 + 활동 목록을 담는 스크롤 컨테이너 */
    .cal-area {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .cal-area::-webkit-scrollbar {
      display: none;
    }

    /* 캘린더 페이지: 히어로 + 캘린더 (grained.js로 노이즈 주입) */
    .cal-page {
      display: flex;
      flex-direction: column;
      /* phone-inner(100dvh)와 동일하게 — svh를 쓰면 모바일 URL 바 영역만큼 빈 공간 발생 */
      min-height: 100dvh;
      /* floating 러닝 활동 버튼(약 94px) + 캘린더와의 40px 간격 */
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 100px);
      background-color: var(--bg);
      position: relative;
      isolation: isolate;
    }

    /* grained.js의 ::before를 콘텐츠 뒤로 */
    #cal-page::before {
      z-index: -1;
    }

    /* 히어로↔캘린더 사이 가변 여백 + 스와이프 인디케이터 */
    .cal-flex-spacer {
      flex: 1;
      min-height: 24px;
      display: flex;
      align-items: flex-end;
      padding: 0 12px 30px;
      gap: 16px;
    }

    .cal-swipe-arrow {
      color: var(--slate-gray);
      display: flex;
      align-items: center;
      pointer-events: none;
      user-select: none;
      transition: color 0.2s ease;
    }

    .cal-swipe-arrow.hidden {
      color: var(--asphalt-gray);
    }

    /* ─── 러닝 활동 하단 floating 버튼 ──────────────── */
    .list-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 16px calc(0px + env(safe-area-inset-bottom, 0px)) 26px;
      background-color: var(--accent);
      color: #202020;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .list-sheet:active {
      background-color: rgba(var(--accent-rgb), 0.85);
      transform: scale(0.99);
    }

    .list-sheet-title {
      font-size: 20px;
      font-weight: 500;
      color: #202020;
      font-family: 'Pretendard Variable', sans-serif;
      transition: color 0.3s;
    }

    /* ─── Month Dropdown ──────────────────── */
    .hero-title {
      position: relative;
    }

    .month-dd-backdrop {
      position: absolute;
      inset: 0;
      z-index: 150;
      display: none;
    }

    .month-dd-backdrop.open {
      display: block;
    }

    .month-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: -8px;
      width: 190px;
      background: var(--surface-3);
      border-radius: 0;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
      z-index: 160;
      overflow: hidden;
      opacity: 0;
      transform: scale(0.88) translateY(-6px);
      transform-origin: top left;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.2s cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    .month-dropdown.open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    /* ─── Month List Picker ──────────────── */
    .month-list {
      max-height: 300px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .month-list::-webkit-scrollbar {
      display: none;
    }

    .month-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 12px;
      margin: 0 -12px;
      border-radius: 0;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s cubic-bezier(0.16, 1, 0.3, 1);
      gap: 12px;
    }

    .month-list-item:active {
      background: rgba(0, 0, 0, 0.25);
      transform: scale(0.98);
    }

    .month-list-content {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .month-list-year {
      font-size: 18px;
      font-weight: 400;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--text-2);
      min-width: 40px;
    }

    .month-list-label {
      font-size: 18px;
      font-weight: 300;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--text-1);
    }

    .month-list-item.ml-selected .month-list-label {
      color: var(--accent);
      font-weight: 500;
    }

    .month-list-check {
      width: 18px;
      height: 18px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .month-list-item.ml-selected .month-list-check {
      opacity: 1;
    }



    /* ─── Wheel Picker ───────────────────── */
    .wheel-picker {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: stretch;
      height: 224px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .wheel-highlight {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: rgb(180 180 180 / 10%);
      border-radius: 4px;
      height: 52px;
      pointer-events: none;
      z-index: 3;
    }

    .wheel-col {
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      flex: 0 0 auto;
      width: 120px;
      /* 텍스트에만 그라디언트 마스크 적용 */
      -webkit-mask-image: linear-gradient(to bottom,
          transparent 0%,
          black 38%,
          black 62%,
          transparent 100%);
      mask-image: linear-gradient(to bottom,
          transparent 0%,
          black 38%,
          black 62%,
          transparent 100%);
    }

    .wheel-col::-webkit-scrollbar {
      display: none;
    }

    .wheel-col-year {
      width: 110px;
    }

    .wheel-spacer {
      height: 90px;
      flex-shrink: 0;
    }

    .wheel-item {
      scroll-snap-align: center;
      height: 52px;
      display: flex;
      align-items: center;
      font-size: 22px;
      color: var(--slate-gray);
      user-select: none;
    }

    .wheel-col-year .wheel-item {
      justify-content: flex-end;
      padding-right: 20px;
    }

    #wheel-month .wheel-item {
      justify-content: flex-start;
      padding-left: 20px;
    }

    .wheel-sheet-footer {
      display: flex;
      padding: 28px 20px 28px;
      flex-shrink: 0;
    }

    #month-sheet .sf-apply-btn {
      background: var(--slate-gray);
      color: #111;
      font-weight: 700;
    }

    /* ─── Month Label (tappable) ──────────── */
    .hero-month-tap {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      border-radius: 0;
      padding: 2px 6px 2px 2px;
      margin-left: -2px;
      transition: background 0.15s, transform 0.1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hero-month-tap:active {
      background: rgba(128, 128, 128, 0.12);
      transform: scale(0.94);
    }

    .hero-month-chevron {
      color: var(--text-1);
      opacity: 0.8;
      flex-shrink: 0;
    }

    /* ─── Month Picker Sheet ──────────────── */
    .month-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .month-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 14px;
      border-radius: 0;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .month-item:active {
      background: rgba(128, 128, 128, 0.18);
      transform: scale(0.97);
    }

    .month-item.active {
      background: rgba(128, 128, 128, 0.08);
    }

    .month-item-label {
      font-size: 16px;
      font-weight: 400;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--text-2);
      letter-spacing: -0.02em;
      transition: color 0.2s;
    }

    .month-item.active .month-item-label {
      color: var(--text-1);
      font-weight: 500;
    }

    .month-item-meta {
      font-size: 13px;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-3);
      transition: color 0.2s;
    }

    .month-item.active .month-item-meta {
      color: var(--accent);
    }

    /* ─── FAB ─────────────────────────────── */
    .fab {
      position: absolute;
      right: 22px;
      bottom: 28px;
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 60;
    }
  </style>
</head>

    async function fetchWeather() {
      try {
        const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
        const { latitude: lat, longitude: lon } = pos.coords;

        // Weather + Air Quality
        const [wRes, aRes] = await Promise.all([
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code`),
          fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm2_5`)
        ]);
        const wData = await wRes.json();
        const aData = await aRes.json();

        const temp = Math.round(wData.current.temperature_2m);
        const hum = wData.current.relative_humidity_2m;
        const code = wData.current.weather_code;
        const pm25 = aData.current.pm2_5;

        const codes = {
          0: '맑음', 1: '대체로 맑음', 2: '부분 구름', 3: '흐림',
          45: '안개', 48: '서리 안개', 51: '가벼운 이슬비', 61: '비',
          71: '눈', 95: '뇌우'
        };
        const desc = codes[code] || '맑음';

        document.getElementById('w-temp').textContent = temp + '°';
        document.getElementById('w-desc').textContent = desc;
        document.getElementById('w-hum').textContent = '습도 ' + hum + '%';

        let pmClass = 'pm-good';
        let pmLabel = '좋음';
        if (pm25 > 35) { pmClass = 'pm-bad'; pmLabel = '나쁨'; }
        else if (pm25 > 15) { pmClass = 'pm-moderate'; pmLabel = '보통'; }

        document.getElementById('w-pm').innerHTML = `<span class="weather-pm-label">미세</span><span class="weather-pm-val ${pmClass}">${pmLabel}</span>`;
      } catch (err) {
        console.error(err);
        document.getElementById('weather-widget').style.opacity = '0.5';
      }
    }

    function navMonth(dir) {
      const next = currentMonthIdx + dir;
      if (next < 0 || next >= MONTHS_ORDER.length) return;
      const wrap = document.getElementById('cal-slide-wrap');
      // slide out
      wrap.classList.add(dir < 0 ? 'slide-out-right' : 'slide-out-left');
      setTimeout(() => {
        wrap.classList.remove('slide-out-right', 'slide-out-left');
        // prepare slide-in from opposite side (no transition)
        wrap.style.transition = 'none';
        wrap.classList.add(dir < 0 ? 'slide-in-left' : 'slide-in-right');
        currentMonthIdx = next;
        renderMonth();
        // force reflow then animate in
        wrap.getBoundingClientRect();
        wrap.style.transition = '';
        wrap.classList.remove('slide-in-left', 'slide-in-right');
      }, 200);
    }

    function renderMonth() {
      const key = MONTHS_ORDER[currentMonthIdx];
      const d = MONTH_DATA[key];
      const kmEl = document.querySelector('.hero-km-value');
      if (kmEl) kmEl.textContent = d.km;

      if (gridEl) gridEl.innerHTML = d.calGrid;

      if (arrowL) arrowL.classList.toggle('hidden', currentMonthIdx <= 0);

    }

    function animateCounter(el, start, end, duration) {
      const startTime = performance.now();

      function updateCounter(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const current = start + (end - start) * progress;
        el.textContent = current.toFixed(1);

        if (progress < 1) {
          requestAnimationFrame(updateCounter);
        }
      }

      requestAnimationFrame(updateCounter);
    }

    /* ═══════════════════════════════════════
       MONTH LIST PICKER
    ═══════════════════════════════════════ */
    const ALL_MONTHS = (() => {
      const list = [];
      let y = 2026, m = 4;
      while (y > 2025 || (y === 2025 && m >= 1)) {
        list.push({ year: y, month: m });
        m--; if (m === 0) { m = 12; y--; }
      }
      return list;
    })();

    const MONTH_KEY_MAP = { '2026-4': 1, '2026-3': 0 };

    const WHEEL_YEARS = [...new Set(ALL_MONTHS.map(m => m.year))].sort((a, b) => b - a);
    const WHEEL_ITEM_H = 44;

    function getMonthsForYear(year) {
      return ALL_MONTHS
        .filter(m => m.year === year)
        .map(m => m.month)
        .sort((a, b) => b - a);
    }

    let _wheelMonths = [];

    function buildMonthWheel(year, snapMonth) {
      _wheelMonths = getMonthsForYear(year);
      const col = document.getElementById('wheel-month');
      col.innerHTML =
        '<div class="wheel-spacer"></div>' +
        _wheelMonths.map(m => `<div class="wheel-item">${m}월</div>`).join('') +
        '<div class="wheel-spacer"></div>';
      const idx = snapMonth !== undefined
        ? Math.max(0, _wheelMonths.indexOf(snapMonth))
        : 0;
      col.scrollTop = idx * WHEEL_ITEM_H;
    }

    function openMonthSheet() {
      const curObj = ALL_MONTHS.find(m => MONTH_KEY_MAP[`${m.year}-${m.month}`] === currentMonthIdx);
      const initYear = curObj ? curObj.year : WHEEL_YEARS[0];
      const initMonth = curObj ? curObj.month : getMonthsForYear(WHEEL_YEARS[0])[0];

      const yearCol = document.getElementById('wheel-year');
      yearCol.innerHTML =
        '<div class="wheel-spacer"></div>' +
        WHEEL_YEARS.map(y => `<div class="wheel-item">${y}년</div>`).join('') +
        '<div class="wheel-spacer"></div>';
      yearCol.scrollTop = WHEEL_YEARS.indexOf(initYear) * WHEEL_ITEM_H;

      buildMonthWheel(initYear, initMonth);

      let _yearTimer = null;
      yearCol.onscroll = () => {
        clearTimeout(_yearTimer);
        _yearTimer = setTimeout(() => {
          const yi = Math.round(yearCol.scrollTop / WHEEL_ITEM_H);
          const y = WHEEL_YEARS[Math.max(0, Math.min(yi, WHEEL_YEARS.length - 1))];
          buildMonthWheel(y);
        }, 120);
      };

      document.getElementById('month-sheet').classList.add('open');
      document.getElementById('month-backdrop').classList.add('open');
    }

    function confirmMonthPick() {
      const yearCol = document.getElementById('wheel-year');
      const monthCol = document.getElementById('wheel-month');
      const yearIdx = Math.round(yearCol.scrollTop / WHEEL_ITEM_H);
      const monthIdx = Math.round(monthCol.scrollTop / WHEEL_ITEM_H);
      const year = WHEEL_YEARS[Math.max(0, Math.min(yearIdx, WHEEL_YEARS.length - 1))];
      const month = _wheelMonths[Math.max(0, Math.min(monthIdx, _wheelMonths.length - 1))];
      const newIdx = MONTH_KEY_MAP[`${year}-${month}`];
      closeMonthSheet();
      if (newIdx === undefined || newIdx === currentMonthIdx) return;
      const dir = newIdx > currentMonthIdx ? 1 : -1;
      const wrap = document.getElementById('cal-slide-wrap');
      wrap.classList.add(dir < 0 ? 'slide-out-right' : 'slide-out-left');
      setTimeout(() => {
        wrap.classList.remove('slide-out-right', 'slide-out-left');
        wrap.style.transition = 'none';
        wrap.classList.add(dir < 0 ? 'slide-in-left' : 'slide-in-right');
        currentMonthIdx = newIdx;
        renderMonth();
        wrap.getBoundingClientRect();
        wrap.style.transition = '';
        wrap.classList.remove('slide-in-left', 'slide-in-right');
      }, 200);
    }

    function closeMonthSheet() {
      document.getElementById('month-sheet').classList.remove('open');
      document.getElementById('month-backdrop').classList.remove('open');
    }

    // Swipe (touch + mouse) on calendar
    (function () {
      const cal = document.getElementById('calendar-1');
      let startX = 0;
      let dragging = false;

      // Touch
      cal.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
      }, { passive: true });
      cal.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) > 40) navMonth(dx < 0 ? 1 : -1);
      }, { passive: true });

      // Mouse (for desktop testing)
      cal.addEventListener('mousedown', e => {
        startX = e.clientX;
        dragging = true;
      });
      window.addEventListener('mouseup', e => {
        if (!dragging) return;
        dragging = false;
        const dx = e.clientX - startX;
        if (Math.abs(dx) > 40) navMonth(dx < 0 ? 1 : -1);
      });
    })();
  </script>

      icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#cdcdcd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>';
      wrap.appendChild(icon);
      document.body.appendChild(wrap);
      const ks = document.createElement('style');
      ks.textContent = '@keyframes ptr-spin{to{transform:rotate(360deg)}}';
      document.head.appendChild(ks);
      if (sessionStorage.getItem('ptr-return')) {
        sessionStorage.removeItem('ptr-return');
        if (scrollEl) { scrollEl.style.transition = 'none'; scrollEl.style.transform = 'translateY(64px)'; }
        setTimeout(() => { if (scrollEl) { scrollEl.style.transition = 'transform 0.5s cubic-bezier(0.16,1,0.3,1)'; scrollEl.style.transform = ''; } }, 50);
      }
      let startY = 0, pullDist = 0, tracking = false, triggered = false;
      function scrollTop() { const el = document.querySelector('.cal-area,.scroll-area,.list-scroll'); return el ? el.scrollTop : window.scrollY; }

        const ty = (p / THRESHOLD) * 52 - 52;
        wrap.style.transform = `translateX(-50%) translateY(${ty}px)`;
        wrap.style.opacity = o;
        icon.style.transform = `rotate(${Math.min(p / THRESHOLD, 1) * 210}deg)`;

      document.addEventListener('touchend', () => { if (!tracking) return; tracking = false; const ease = 'transform 0.25s cubic-bezier(0.16,1,0.3,1),opacity 0.25s'; wrap.style.transition = ease; icon.style.transition = 'transform 0.25s'; if (scrollEl) scrollEl.style.transition = 'transform 0.25s cubic-bezier(0.16,1,0.3,1)'; if (pullDist >= THRESHOLD) { triggered = true; wrap.style.transform = 'translateX(-50%) translateY(8px)'; wrap.style.opacity = '1'; if (scrollEl) scrollEl.style.transform = 'translateY(64px)'; icon.style.transform = 'none'; icon.style.transition = 'none'; icon.style.animation = 'ptr-spin 0.55s linear infinite'; sessionStorage.setItem('ptr-return', '1'); setTimeout(() => window.location.reload(), 700); } else { wrap.style.transform = 'translateX(-50%) translateY(-52px)'; wrap.style.opacity = '0'; if (scrollEl) scrollEl.style.transform = ''; } pullDist = 0; }, { passive: true });
    })();
  </script>
