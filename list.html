<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>runit — 러닝 활동</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#202020">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="runit">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./transitions.js"></script>
  <style>
    /* ─── PB header button ── */
    /* ─── List page layout ── */
    .list-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .list-scroll {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      /* 스크롤 끝 여백만 safe-area만큼 더해 마지막 콘텐츠가 홈 인디케이터 위에 오도록.
         스크롤 viewport는 viewport 끝까지 확장되어 홈 인디케이터 영역이 투명하게 콘텐츠 위에 겹치게 함. */
      padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
    }

    .list-scroll::-webkit-scrollbar {
      display: none;
    }

    /* ─── Month section header ── */
    .lp-month-section {
      padding: 14px 20px;
      background-color: var(--asphalt-black);
      position: sticky;
      top: env(safe-area-inset-top, 0px);
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }





    /* ─── Type colors ── */
    .type-race {
      background: var(--type-race-bg);
      color: var(--type-race-text);
    }

    .type-tempo {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    .type-interval {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    .type-steady {
      background: var(--type-steady-bg);
      color: var(--type-steady-text);
    }

    .type-easy {
      background: var(--type-easy-bg);
      color: var(--type-easy-text);
    }

    .type-jogging {
      background: var(--type-jog-bg);
      color: var(--type-jog-text);
    }

    .type-long {
      background: var(--type-long-bg);
      color: var(--type-long-text);
    }

    /* ─── Empty ── */
    .empty-result {
      padding: 48px 20px;
      text-align: center;
      font-size: 14px;
      color: var(--text-2);
      font-family: 'Pretendard Variable', sans-serif;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="phone">
    <div class="phone-inner bg-dark">

      <!-- 리스트 -->
      <div class="list-page">
        <div class="list-scroll" id="list-scroll">
          <div class="back-header back-header--accent">
            <button class="back-btn" onclick="goBack('runit-home.html')">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 19-7-7 7-7" />
                <path d="M19 12H5" />
              </svg>
            </button>
            <span class="back-title">러닝 활동</span>
            <button class="header-action-btn" onclick="goToStats()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--asphalt-black)" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" x2="18" y1="20" y2="10" />
                <line x1="12" x2="12" y1="20" y2="4" />
                <line x1="6" x2="6" y1="20" y2="14" />
              </svg>
            </button>
          </div>
          <div id="runs-list-container"></div>
        </div>
      </div>

      <!-- 플로팅 바 -->
      <div class="float-bar-wrap visible" id="float-sf-bar">
        <div class="float-view-bar" id="float-view-bar">
          <div class="float-sf-item" id="float-view-btn" onclick="toggleViewMode()">
            <svg id="view-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="18" x="3" y="3" rx="2" />
              <path d="M3 12h18" />
            </svg>
          </div>
        </div>
        <div class="float-sf-inner" id="float-sf-inner">
          <div class="float-sf-item" id="float-sort-btn" onclick="openSortSheet()">
            <!--svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="m21 16-4 4-4-4" />
              <path d="M17 20V4" />
              <path d="m3 8 4-4 4 4" />
              <path d="M7 4v16" />
            </svg-->
            정렬
            <span class="sf-badge" id="float-sort-badge"></span>
          </div>

          <div class="float-sf-item" id="float-filter-btn" onclick="openFilterSheet()">
            <!--svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="21" x2="14" y1="4" y2="4" />
              <line x1="10" x2="3" y1="4" y2="4" />
              <line x1="21" x2="12" y1="12" y2="12" />
              <line x1="8" x2="3" y1="12" y2="12" />
              <line x1="21" x2="16" y1="20" y2="20" />
              <line x1="12" x2="3" y1="20" y2="20" />
              <line x1="14" x2="14" y1="2" y2="6" />
              <line x1="8" x2="8" y1="10" y2="14" />
              <line x1="16" x2="16" y1="18" y2="22" />
            </svg-->
            필터
            <span class="sf-badge" id="float-filter-badge"></span>
          </div>
        </div>
      </div>

      <!-- Sort sheet -->
      <div class="sf-backdrop" id="sf-backdrop" onclick="closeSFSheet()"></div>
      <div class="month-modal" id="sort-sheet">
        <div class="sf-sheet-header">
          <span class="sf-sheet-title">정렬</span>
          <button class="sf-sheet-close" onclick="closeSFSheet()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <div class="month-list" id="sf-sort-opts" style="padding: 0 20px 20px;"></div>
      </div>

      <!-- Filter sheet -->
      <div class="month-modal" id="filter-sheet">
        <div class="sf-sheet-header">
          <span class="sf-sheet-title">필터</span>
          <button class="sf-sheet-close" onclick="closeSFSheet()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <div class="sf-sheet-body">
          <div class="filter-cats" id="sf-filter-cats"></div>
        </div>
        <div class="sf-sheet-footer">
          <button class="sf-reset-btn" onclick="resetFilters()">초기화</button>
          <button class="sf-apply-btn" onclick="closeSFSheet()">적용</button>
        </div>
      </div>

    </div><!-- /phone-inner -->
  </div><!-- /phone -->

  <script>
    /* ─── Data ── */
    const RUNS = [
      { id: 1, date: '2026-04-11', label: '4/11', month: 4, type: 'race', group: 'race', name: '2026 인천하프', time: '08:00', dur: '1:46:42', km: 21.2, pace: '5:02', paceV: 302, bpm: 176, spm: 174, ground: 214, stride: 107 },
      { id: 2, date: '2026-04-10', label: '4/10', month: 4, type: 'jogging', group: 'easy', name: '회복 조깅', time: '07:30', dur: '37:05', km: 5.4, pace: '6:52', paceV: 412, bpm: 142, spm: 163, ground: 268, stride: 88 },
      { id: 3, date: '2026-04-07', label: '4/7', month: 4, type: 'tempo', group: 'speed', name: '템포 런', time: '06:15', dur: '38:00', km: 8.0, pace: '4:45', paceV: 285, bpm: 169, spm: 180, ground: 208, stride: 112 },
      { id: 4, date: '2026-04-05', label: '4/5', month: 4, type: 'easy', group: 'easy', name: '이지 런', time: '06:30', dur: '45:00', km: 7.2, pace: '6:15', paceV: 375, bpm: 138, spm: 162, ground: 252, stride: 91 },
      { id: 5, date: '2026-04-04', label: '4/4', month: 4, type: 'easy', group: 'easy', name: '이지 런', time: '18:00', dur: '43:04', km: 6.8, pace: '6:20', paceV: 380, bpm: 135, spm: 160, ground: 255, stride: 89 },
      { id: 6, date: '2026-04-03', label: '4/3', month: 4, type: 'easy', group: 'easy', name: '이지 런', time: '07:00', dur: '33:20', km: 5.0, pace: '6:40', paceV: 400, bpm: 132, spm: 158, ground: 260, stride: 86 },
      { id: 7, date: '2026-03-30', label: '3/30', month: 3, type: 'steady', group: 'endurance', name: '스테디 런', time: '07:30', dur: '57:45', km: 10.5, pace: '5:30', paceV: 330, bpm: 158, spm: 170, ground: 238, stride: 98 },
      { id: 8, date: '2026-03-28', label: '3/28', month: 3, type: 'steady', group: 'endurance', name: '스테디 런', time: '07:00', dur: '55:12', km: 9.8, pace: '5:38', paceV: 338, bpm: 155, spm: 168, ground: 241, stride: 96 },
      { id: 9, date: '2026-03-22', label: '3/22', month: 3, type: 'race', group: 'race', name: '서울 10K', time: '09:00', dur: '48:40', km: 10.0, pace: '4:52', paceV: 292, bpm: 172, spm: 177, ground: 216, stride: 105 },
      { id: 10, date: '2026-03-20', label: '3/20', month: 3, type: 'steady', group: 'endurance', name: '스테디 런', time: '07:15', dur: '1:00:40', km: 11.2, pace: '5:25', paceV: 325, bpm: 160, spm: 171, ground: 244, stride: 100 },
      { id: 11, date: '2026-03-19', label: '3/19', month: 3, type: 'jogging', group: 'easy', name: '회복 조깅', time: '07:30', dur: '34:00', km: 4.8, pace: '7:05', paceV: 425, bpm: 138, spm: 161, ground: 271, stride: 85 },
      { id: 12, date: '2026-03-13', label: '3/13', month: 3, type: 'easy', group: 'easy', name: '이지 런', time: '06:45', dur: '52:08', km: 8.5, pace: '6:08', paceV: 368, bpm: 141, spm: 164, ground: 257, stride: 93 },
      { id: 13, date: '2026-03-09', label: '3/9', month: 3, type: 'easy', group: 'easy', name: '이지 런', time: '07:00', dur: '38:12', km: 6.0, pace: '6:22', paceV: 382, bpm: 136, spm: 160, ground: 262, stride: 90 },
      { id: 14, date: '2026-02-25', label: '2/25', month: 2, type: 'long', group: 'endurance', name: '롱 런', time: '07:00', dur: '1:44:24', km: 18.0, pace: '5:48', paceV: 348, bpm: 155, spm: 168, ground: 245, stride: 97 },
      { id: 15, date: '2026-02-18', label: '2/18', month: 2, type: 'tempo', group: 'speed', name: '템포 런', time: '06:30', dur: '36:30', km: 7.5, pace: '4:52', paceV: 292, bpm: 167, spm: 178, ground: 212, stride: 110 },
      { id: 16, date: '2026-02-10', label: '2/10', month: 2, type: 'steady', group: 'endurance', name: '스테디 런', time: '07:15', dur: '52:26', km: 9.2, pace: '5:42', paceV: 342, bpm: 152, spm: 167, ground: 242, stride: 95 },
      { id: 17, date: '2026-02-02', label: '2/2', month: 2, type: 'easy', group: 'easy', name: '이지 런', time: '08:00', dur: '35:34', km: 5.5, pace: '6:28', paceV: 388, bpm: 133, spm: 159, ground: 258, stride: 87 },
    ];

    const MONTH_LABELS = { 4: '4월', 3: '3월', 2: '2월' };

    let sortState = { key: 'date', asc: false };
    let filterState = { type: null, bpm: null, distMin: 0, distMax: 42, paceMin: 240, paceMax: 600 };

    const SORT_OPTS = [
      { key: 'date', asc: false, label: '날짜 최신순' },
      { key: 'date', asc: true, label: '날짜 오래된순' },
      { key: 'km', asc: false, label: '거리 긴순' },
      { key: 'km', asc: true, label: '거리 짧은순' },
      { key: 'paceV', asc: true, label: '페이스 빠른순' },
      { key: 'paceV', asc: false, label: '페이스 느린순' },
      { key: 'bpm', asc: false, label: '심박수 높은순' },
      { key: 'bpm', asc: true, label: '심박수 낮은순' },
      { key: 'spm', asc: false, label: '케이던스 높은순' },
      { key: 'spm', asc: true, label: '케이던스 낮은순' },
      { key: 'stride', asc: false, label: '보행길이 긴 순' },
      { key: 'stride', asc: true, label: '보행길이 짧은 순' },
    ];

    const FILTER_TYPE_OPTS = [
      { val: 'race', label: '레이스' },
      { val: 'speed', label: '스피드' },
      { val: 'endurance', label: '지구력' },
      { val: 'easy', label: '이지' },
    ];
    const FILTER_ZONE_OPTS = [
      { val: 'z1', label: 'Z1', desc: '회복' }, { val: 'z2', label: 'Z2', desc: '유산소' },
      { val: 'z3', label: 'Z3', desc: '유산소+' }, { val: 'z4', label: 'Z4', desc: '젖산' },
      { val: 'z5', label: 'Z5', desc: '최대' },
    ];

    /* ─── Sort/Filter ── */
    function applyFilters(runs) {
      return runs.filter(r => {
        if (filterState.type && r.group !== filterState.type) return false;
        if (r.km < filterState.distMin || r.km > filterState.distMax) return false;
        if (r.paceV < filterState.paceMin || r.paceV > filterState.paceMax) return false;
        if (filterState.bpm) {
          const z = { z1: [0, 119], z2: [120, 139], z3: [140, 159], z4: [160, 174], z5: [175, 999] }[filterState.bpm];
          if (r.bpm < z[0] || r.bpm > z[1]) return false;
        }
        return true;
      });
    }

    function applySort(runs) {
      const { key, asc } = sortState;
      return [...runs].sort((a, b) => {
        let va = a[key], vb = b[key];
        if (key === 'date') { va = va.replace(/-/g, ''); vb = vb.replace(/-/g, ''); }
        return asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
      });
    }

    /* ─── Render ── */
    let viewMode = 'expanded';

    function renderList() {
      const container = document.getElementById('runs-list-container');
      const sorted = applySort(applyFilters(RUNS));
      if (sorted.length === 0) {
        container.innerHTML = '<div class="empty-result">해당하는 활동이 없습니다</div>';
        return;
      }
      const groupByMonth = sortState.key === 'date';
      if (groupByMonth) {
        const groups = {};
        sorted.forEach(r => { if (!groups[r.month]) groups[r.month] = []; groups[r.month].push(r); });
        const months = Object.keys(groups).sort((a, b) => sortState.asc ? a - b : b - a);
        container.innerHTML = months.map(m => {
          const runs = groups[m];
          const totalKm = runs.reduce((s, r) => s + r.km, 0).toFixed(1);
          return `<div class="lp-month-section">
            <div class="lp-month-label">${MONTH_LABELS[m]}</div>
            <div class="lp-month-km"><strong>${totalKm}</strong> K</div>
          </div>
          <div class="lp-list">${runs.map(rowHTML).join('')}</div>`;
        }).join('');
      } else {
        container.innerHTML = `<div class="lp-list">${sorted.map(rowHTML).join('')}</div>`;
      }
    }

    function rowHTML(r) {
      const dateStr = r.date.split('-').map((p, i) => i === 0 ? p : parseInt(p)).join('.');
      const strideM = (r.stride / 100).toFixed(2);
      return `<div class="lp-row ${viewMode}" onclick="goTo('detail.html')"
        <div class="lp-info">
          <div class="lp-title-row">
            <div class="lp-row-left-head">
              <div class="lp-badge type-${r.type}"></div>
              <div class="lp-run-name">${r.name}</div>
            </div>
            <div class="lp-right-content">
              <span class="lp-compact-km">${r.km} K</span>
              <span class="lp-expanded-date">${dateStr}</span>
            </div>
          </div>
          <div class="lp-stats">
            <div class="lp-stats-left">
              <div class="lp-stat">
                <span class="lp-stat-label">시간</span>
                <strong class="lp-stat-value">${r.dur}</strong>
              </div>
              <div class="lp-stat">
                <span class="lp-stat-label">거리</span>
                <span class="lp-stat-value">${r.km} <sup>K</sup></span>
              </div>
              <div class="lp-stat">
                <span class="lp-stat-label">케이던스</span>
                <strong class="lp-stat-value">${r.spm} <sup>SPM</sup></strong>
              </div>
            </div>
            <div class="lp-stats-right">
              <div class="lp-stat-row">
                <span class="lp-stat-label">심박수</span>
                <strong class="lp-stat-value">${r.bpm} <sup>BPM</sup></strong>
              </div>
              <div class="lp-stat-row">
                <span class="lp-stat-label">접지시간</span>
                <strong class="lp-stat-value">${r.ground} <sup>MS</sup></strong>
              </div>
              <div class="lp-stat-row">
                <span class="lp-stat-label">페이스</span>
                <strong class="lp-stat-value">${r.pace} <sup>/K</sup></strong>
              </div>
              <div class="lp-stat-row">
                <span class="lp-stat-label">보행길이</span>
                <strong class="lp-stat-value">${strideM} <sup>M</sup></strong>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    /* ─── View toggle ── */
    function toggleViewMode() {
      viewMode = viewMode === 'compact' ? 'expanded' : 'compact';
      document.querySelectorAll('.lp-row').forEach(row => {
        row.classList.remove('compact', 'expanded');
        row.classList.add(viewMode);
      });
      const icon = document.getElementById('view-icon');
      if (viewMode === 'compact') {
        icon.innerHTML = '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M21 9H3"/><path d="M21 15H3"/>';
      } else {
        icon.innerHTML = '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 12h18"/>';
      }
    }

    /* ─── Sort sheet ── */
    function openSortSheet() {
      renderSortPanel();
      document.getElementById('sort-sheet').classList.add('open');
      document.getElementById('sf-backdrop').classList.add('open');
      document.getElementById('float-sort-btn').classList.add('active');
    }
    function openFilterSheet() {
      renderFilterPanel();
      document.getElementById('filter-sheet').classList.add('open');
      document.getElementById('sf-backdrop').classList.add('open');
      document.getElementById('float-filter-btn').classList.add('active');
    }
    function closeSFSheet() {
      document.getElementById('sort-sheet').classList.remove('open');
      document.getElementById('filter-sheet').classList.remove('open');
      document.getElementById('sf-backdrop').classList.remove('open');
      document.getElementById('float-sort-btn').classList.remove('active');
      document.getElementById('float-filter-btn').classList.remove('active');
    }

    function renderSortPanel() {
      const container = document.getElementById('sf-sort-opts');
      container.innerHTML = SORT_OPTS.map((opt, i) => {
        const active = sortState.key === opt.key && sortState.asc === opt.asc;
        return `<div class="month-list-item${active ? ' ml-selected' : ''}" onclick="selectSort(${i})">
          <span class="month-list-label">${opt.label}</span>
          <svg class="month-list-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
        </div>`;
      }).join('');
    }

    function selectSort(i) {
      const opt = SORT_OPTS[i];
      sortState.key = opt.key;
      sortState.asc = opt.asc;
      renderList();
      updateBadges();
      closeSFSheet();
    }

    function renderFilterPanel() {
      const { distMin, distMax, paceMin, paceMax } = filterState;
      const typeChips = FILTER_TYPE_OPTS.map(o => {
        const a = filterState.type === o.val;
        return `<div class="filter-chip ${a ? 'active' : ''}" onclick="selectFilter('type','${o.val}')">${o.label}</div>`;
      }).join('');
      const zoneChips = FILTER_ZONE_OPTS.map(o => {
        const a = filterState.bpm === o.val;
        return `<div class="filter-chip zone-chip ${a ? 'active' : ''}" onclick="selectFilter('bpm','${o.val}')">
          <span class="zone-label">${o.label}</span>
        </div>`;
      }).join('');
      const distLoV = distMin, distHiV = distMax;
      const paceLoV = fmtPace(paceMin), paceHiV = fmtPace(paceMax);
      document.getElementById('sf-filter-cats').innerHTML = `
        <div class="filter-cat"><div class="filter-cat-label">타입</div><div class="filter-chips">${typeChips}</div></div>
        <div class="filter-cat"><div class="filter-cat-label">거리</div>
          <div class="range-val-row"><span class="range-val" id="dist-lo-val">${distLoV}K</span><span class="range-val" id="dist-hi-val">${distHiV}K</span></div>
          <div class="range-slider-wrap" style="height:20px">
            <div class="range-track"><div class="range-fill" id="dist-fill"></div></div>
            <input type="range" class="range-input" id="dist-lo" min="0" max="42" step="1" value="${distMin}" oninput="onRangeInput('dist')">
            <input type="range" class="range-input" id="dist-hi" min="0" max="42" step="1" value="${distMax}" oninput="onRangeInput('dist')">
          </div>
        </div>
        <div class="filter-cat"><div class="filter-cat-label">페이스</div>
          <div class="range-val-row"><span class="range-val" id="pace-lo-val">${paceLoV}/km</span><span class="range-val" id="pace-hi-val">${paceHiV}/km</span></div>
          <div class="range-slider-wrap" style="height:20px">
            <div class="range-track"><div class="range-fill" id="pace-fill"></div></div>
            <input type="range" class="range-input" id="pace-lo" min="240" max="600" step="10" value="${paceMin}" oninput="onRangeInput('pace')">
            <input type="range" class="range-input" id="pace-hi" min="240" max="600" step="10" value="${paceMax}" oninput="onRangeInput('pace')">
          </div>
        </div>
        <div class="filter-cat"><div class="filter-cat-label">심박 존</div><div class="filter-chips">${zoneChips}</div></div>`;
      updateRangeFill('dist');
      updateRangeFill('pace');
    }

    function selectFilter(key, val) {
      if (key === 'type') filterState.type = filterState.type === val ? null : val;
      if (key === 'bpm') filterState.bpm = filterState.bpm === val ? null : val;
      renderFilterPanel();
      renderList();
      updateBadges();
    }

    function onRangeInput(key) {
      const lo = document.getElementById(key + '-lo');
      const hi = document.getElementById(key + '-hi');
      if (+lo.value >= +hi.value) lo.value = +hi.value - +lo.step;
      if (key === 'dist') {
        filterState.distMin = +lo.value; filterState.distMax = +hi.value;
        document.getElementById('dist-lo-val').textContent = lo.value + 'K';
        document.getElementById('dist-hi-val').textContent = hi.value + 'K';
      } else {
        filterState.paceMin = +lo.value; filterState.paceMax = +hi.value;
        document.getElementById('pace-lo-val').textContent = fmtPace(+lo.value) + '/km';
        document.getElementById('pace-hi-val').textContent = fmtPace(+hi.value) + '/km';
      }
      updateRangeFill(key);
      renderList();
      updateBadges();
    }

    function updateRangeFill(key) {
      const lo = document.getElementById(key + '-lo');
      const hi = document.getElementById(key + '-hi');
      const fill = document.getElementById(key + '-fill');
      if (!lo || !hi || !fill) return;
      const min = +lo.min, max = +lo.max;
      const l = ((+lo.value - min) / (max - min)) * 100;
      const r = ((+hi.value - min) / (max - min)) * 100;
      fill.style.left = l + '%'; fill.style.width = (r - l) + '%';
    }

    function fmtPace(sec) {
      const m = Math.floor(sec / 60), s = sec % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function resetFilters() {
      filterState = { type: null, bpm: null, distMin: 0, distMax: 42, paceMin: 240, paceMax: 600 };
      renderFilterPanel();
      renderList();
      updateBadges();
    }

    function updateBadges() {
      const isDefaultSort = sortState.key === 'date' && !sortState.asc;
      document.getElementById('float-sort-badge').classList.toggle('visible', !isDefaultSort);
      const hasFilter = filterState.type || filterState.bpm ||
        filterState.distMin > 0 || filterState.distMax < 42 ||
        filterState.paceMin > 240 || filterState.paceMax < 600;
      document.getElementById('float-filter-badge').classList.toggle('visible', !!hasFilter);
    }

    /* ─── Init ── */
    renderList();
    renderSortPanel();
    renderFilterPanel();
  </script>

  <script>
    (function () {
      const THRESHOLD = 80, MAX_PULL = 120, RESIST = 0.45;
      const scrollEl = document.querySelector('.list-scroll');
      const headerH = 0;
      const wrap = document.createElement('div');
      wrap.style.cssText = `position:fixed;top:${headerH}px;left:50%;transform:translateX(-50%) translateY(-52px);width:44px;height:44px;border-radius:0;background:rgba(35,35,35,0.92);backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;z-index:9;pointer-events:none;transition:transform 0.25s cubic-bezier(0.16,1,0.3,1),opacity 0.25s;opacity:0`;
      const icon = document.createElement('div');
      icon.style.cssText = 'display:flex;align-items:center;justify-content:center;';
      icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#cdcdcd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>';
      wrap.appendChild(icon);
      document.body.appendChild(wrap);
      const ks = document.createElement('style');
      ks.textContent = '@keyframes ptr-spin{to{transform:rotate(360deg)}}';
      document.head.appendChild(ks);
      if (sessionStorage.getItem('ptr-return')) {
        sessionStorage.removeItem('ptr-return');
        if (scrollEl) { scrollEl.style.transition = 'none'; scrollEl.style.transform = 'translateY(64px)'; }
        setTimeout(() => { if (scrollEl) { scrollEl.style.transition = 'transform 0.5s cubic-bezier(0.16,1,0.3,1)'; scrollEl.style.transform = ''; } }, 50);
      }
      let startY = 0, pullDist = 0, tracking = false, triggered = false;
      function scrollTop() { const el = document.querySelector('.scroll-area,.list-scroll'); return el ? el.scrollTop : window.scrollY; }
      function setPos(p, o) {
        const ty = (p / THRESHOLD) * 52 - 52;
        wrap.style.transform = `translateX(-50%) translateY(${ty}px)`;
        wrap.style.opacity = o;
        icon.style.transform = `rotate(${Math.min(p / THRESHOLD, 1) * 210}deg)`;
        if (scrollEl) scrollEl.style.transform = `translateY(${Math.max(0, p * 0.8)}px)`;
      }
      document.addEventListener('touchstart', e => { if (triggered || scrollTop() > 2) return; startY = e.touches[0].clientY; pullDist = 0; tracking = true; wrap.style.transition = 'none'; icon.style.transition = 'none'; if (scrollEl) scrollEl.style.transition = 'none'; }, { passive: true });
      document.addEventListener('touchmove', e => { if (!tracking) return; if (scrollTop() > 2) { tracking = false; return; } const dy = e.touches[0].clientY - startY; if (dy <= 0) return; pullDist = Math.min(dy * RESIST, MAX_PULL); setPos(pullDist, Math.min(pullDist / THRESHOLD, 1)); }, { passive: true });
      document.addEventListener('touchend', () => { if (!tracking) return; tracking = false; const ease = 'transform 0.25s cubic-bezier(0.16,1,0.3,1),opacity 0.25s'; wrap.style.transition = ease; icon.style.transition = 'transform 0.25s'; if (scrollEl) scrollEl.style.transition = 'transform 0.25s cubic-bezier(0.16,1,0.3,1)'; if (pullDist >= THRESHOLD) { triggered = true; wrap.style.transform = 'translateX(-50%) translateY(8px)'; wrap.style.opacity = '1'; if (scrollEl) scrollEl.style.transform = 'translateY(64px)'; icon.style.transform = 'none'; icon.style.transition = 'none'; icon.style.animation = 'ptr-spin 0.55s linear infinite'; sessionStorage.setItem('ptr-return', '1'); setTimeout(() => window.location.reload(), 700); } else { wrap.style.transform = 'translateX(-50%) translateY(-52px)'; wrap.style.opacity = '0'; if (scrollEl) scrollEl.style.transform = ''; } pullDist = 0; }, { passive: true });
    })();
  </script>
  <script>
    function goToStats() { goTo('stats.html'); }
  </script>
  <script>
    /* ─── 헤더 scroll-hide ── */
    (function () {
      const header = document.querySelector('.back-header');
      const scroller = document.querySelector('.list-scroll');
      if (!header || !scroller) return;

      const HEADER_H = header.offsetHeight;
      let lastY = 0;
      let pinned = false;

      scroller.addEventListener('scroll', function () {
        const y = scroller.scrollTop;
        const down = y > lastY;
        lastY = y;

        if (y < HEADER_H + 20) {
          if (pinned) {
            pinned = false;
            header.style.transition = 'none';
            header.style.top = '';
          }
          return;
        }

        if (down && pinned) {
          pinned = false;
          header.style.transition = 'top 0.22s cubic-bezier(0.4, 0, 1, 1)';
          header.style.top = '';
        } else if (!down && !pinned) {
          pinned = true;
          header.style.transition = 'top 0.35s cubic-bezier(0.16, 1, 0.3, 1)';
          header.style.top = 'env(safe-area-inset-top, 0px)';
        }
      }, { passive: true });
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>

</html>
