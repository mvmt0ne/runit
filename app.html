<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>runit</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#202020">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="runit">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <script src="./transitions.js"></script>
  <style>
    /* ─── SPA 셸 ── */
    .phone-inner {
      height: 100dvh;
      min-height: 100dvh;
      position: relative;
    }

    /* 스와이퍼는 phone-inner 전체를 채운다 — 탭바 뒤까지 확장 */
    .app-swiper {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .app-swiper .swiper-wrapper {
      height: 100%;
    }

    .app-swiper .swiper-slide {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--asphalt-black);
    }

    .app-swiper iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>

<body>
  <div class="phone">
    <div class="phone-inner">

      <div class="swiper app-swiper" id="app-swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide" data-tab="home">
            <iframe src="./runit-home.html" title="홈" loading="eager"></iframe>
          </div>
          <div class="swiper-slide" data-tab="list">
            <iframe src="./list.html" title="활동" loading="lazy"></iframe>
          </div>
          <div class="swiper-slide" data-tab="stats">
            <iframe src="./stats.html" title="마일리지" loading="lazy"></iframe>
          </div>
          <div class="swiper-slide" data-tab="pb">
            <iframe src="./pb.html" title="PB" loading="lazy"></iframe>
          </div>
        </div>
      </div>

      <nav class="tab-bar" id="app-tab-bar">
        <a class="tab-item active" data-idx="0" href="#home">
          <div class="tab-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10.5 12 3l9 7.5" />
              <path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5" />
            </svg>
          </div>
          <div class="tab-label">홈</div>
        </a>
        <a class="tab-item" data-idx="1" href="#list">
          <div class="tab-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <circle cx="4" cy="6" r="1" />
              <circle cx="4" cy="12" r="1" />
              <circle cx="4" cy="18" r="1" />
            </svg>
          </div>
          <div class="tab-label">활동</div>
        </a>
        <a class="tab-item" data-idx="2" href="#stats">
          <div class="tab-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 21h18" />
              <rect x="5" y="12" width="3" height="7" />
              <rect x="10.5" y="8" width="3" height="11" />
              <rect x="16" y="4" width="3" height="15" />
            </svg>
          </div>
          <div class="tab-label">마일리지</div>
        </a>
        <a class="tab-item" data-idx="3" href="#pb">
          <div class="tab-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 4h8v4a4 4 0 0 1-8 0V4Z" />
              <path d="M16 6h3v2a3 3 0 0 1-3 3" />
              <path d="M8 6H5v2a3 3 0 0 0 3 3" />
              <path d="M10 14h4v3h-4z" />
              <path d="M8 20h8" />
            </svg>
          </div>
          <div class="tab-label">PB</div>
        </a>
      </nav>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    (function () {
      const TABS = ['home', 'list', 'stats', 'pb'];
      const hash = (location.hash || '').replace('#', '');
      const initialIdx = Math.max(0, TABS.indexOf(hash));

      const swiper = new Swiper('#app-swiper', {
        initialSlide: initialIdx,
        slidesPerView: 1,
        spaceBetween: 0,
        threshold: 8,                  // px 미만 드래그는 무시 (탭과 충돌 방지)
        speed: 280,
        resistanceRatio: 0.5,
        longSwipesRatio: 0.25,
        touchAngle: 35,                // 가로 35° 이내 제스처만 (세로 스크롤 방해 X)
        followFinger: true,
        on: {
          slideChange() {
            updateActiveTab(this.activeIndex);
            history.replaceState(null, '', '#' + TABS[this.activeIndex]);
          }
        }
      });

      function updateActiveTab(idx) {
        document.querySelectorAll('#app-tab-bar .tab-item').forEach((el, i) => {
          el.classList.toggle('active', i === idx);
        });
      }

      document.querySelectorAll('#app-tab-bar .tab-item').forEach((el, i) => {
        el.addEventListener('click', e => {
          e.preventDefault();
          swiper.slideTo(i);
        });
      });

      updateActiveTab(initialIdx);

      /* 외부에서 hash 바뀌면 슬라이드 동기화 */
      window.addEventListener('hashchange', () => {
        const h = (location.hash || '').replace('#', '');
        const idx = TABS.indexOf(h);
        if (idx >= 0 && idx !== swiper.activeIndex) swiper.slideTo(idx);
      });

      /* iframe 안에서 가로 스와이프 발생 시 슬라이드 이동 (transitions.js 브리지) */
      window.addEventListener('message', (e) => {
        const d = e.data;
        if (!d || d.type !== 'runit:swipe') return;
        if (d.dir === 'next') swiper.slideNext();
        else if (d.dir === 'prev') swiper.slidePrev();
      });
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>

</html>
