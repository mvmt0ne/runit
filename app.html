<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>runit</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#202020">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="runit">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <script src="./transitions.js"></script>
  <!-- 홈 페이지가 인라인으로 grained() 호출 → 미리 로드 필요 -->
  <script src="./grained.js"></script>
  <!-- 액체 유리 효과 (탭바 backdrop-filter) -->
  <script src="./liquid-glass.js"></script>
  <style>
    /* ─── SPA 셸 ─── */
    .phone-inner {
      height: 100dvh;
      min-height: 100dvh;
      position: relative;
    }

    /* 스와이퍼는 phone-inner 전체를 채운다 — 탭바 뒤까지 확장 */
    .app-swiper {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .app-swiper .swiper-wrapper {
      height: 100%;
    }

    .app-swiper .swiper-slide {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--asphalt-black);
    }

    /* 각 슬라이드는 페이지의 .phone-inner 콘텐츠를 직접 호스트 — 내부에서 100% 사용 */
    .app-swiper .swiper-slide > * {
      box-sizing: border-box;
    }

    .swiper-slide.loading {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      font-family: 'Pretendard Variable', sans-serif;
      font-size: 14px;
      opacity: 0.4;
    }

    .swiper-slide.loading::after {
      content: '로딩중...';
    }

    /* 슬라이드는 자체적으로 flex column 레이아웃을 가진다 (페이지의 .phone-inner 역할) */
    .swiper-slide:not(.loading) {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
  <div class="phone">
    <div class="phone-inner">

      <div class="swiper app-swiper" id="app-swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide slide-home loading" data-tab="home" data-src="./runit-home.html"></div>
          <div class="swiper-slide slide-list loading" data-tab="list" data-src="./list.html"></div>
          <div class="swiper-slide slide-stats loading" data-tab="stats" data-src="./stats.html"></div>
          <div class="swiper-slide slide-pb loading" data-tab="pb" data-src="./pb.html"></div>
        </div>
      </div>

      <nav class="tab-bar" id="app-tab-bar">
        <a class="tab-item active" data-idx="0" href="#home">
          <div class="tab-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10.5 12 3l9 7.5" />
              <path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5" />
            </svg>
          </div>
          <div class="tab-label">홈</div>
        </a>
        <a class="tab-item" data-idx="1" href="#list">
          <div class="tab-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <circle cx="4" cy="6" r="1" />
              <circle cx="4" cy="12" r="1" />
              <circle cx="4" cy="18" r="1" />
            </svg>
          </div>
          <div class="tab-label">활동</div>
        </a>
        <a class="tab-item" data-idx="2" href="#stats">
          <div class="tab-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 21h18" />
              <rect x="5" y="12" width="3" height="7" />
              <rect x="10.5" y="8" width="3" height="11" />
              <rect x="16" y="4" width="3" height="15" />
            </svg>
          </div>
          <div class="tab-label">마일리지</div>
        </a>
        <a class="tab-item" data-idx="3" href="#pb">
          <div class="tab-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 4h8v4a4 4 0 0 1-8 0V4Z" />
              <path d="M16 6h3v2a3 3 0 0 1-3 3" />
              <path d="M8 6H5v2a3 3 0 0 0 3 3" />
              <path d="M10 14h4v3h-4z" />
              <path d="M8 20h8" />
            </svg>
          </div>
          <div class="tab-label">PB</div>
        </a>
      </nav>

    </div>
  </div>

  <!-- 액체 유리 SVG 필터 컨테이너 (liquid-glass.js 가 동적으로 채움) -->
  <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0"
    style="position:absolute;width:0;height:0;overflow:hidden" color-interpolation-filters="sRGB" aria-hidden="true">
    <defs id="svg-defs"></defs>
  </svg>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    (async function () {
      const TABS = ['home', 'list', 'stats', 'pb'];

      /**
       * 각 탭 페이지(예: runit-home.html)를 fetch 해서:
       *   1. <head> <style> → @scope (.slide-<name>) 로 감싸 head에 주입 (격리)
       *   2. .phone-inner 콘텐츠 → 슬라이드 div 안에 직접 삽입
       *   3. <body> inline <script> → IIFE 로 감싸 body에 추가 (전역 격리)
       */
      async function loadSlide(slide) {
        if (!slide.dataset.src || slide.dataset.loaded === '1') return;
        slide.dataset.loaded = '1';

        const url = slide.dataset.src;
        const tab = slide.dataset.tab;
        const scope = `.slide-${tab}`;

        try {
          const html = await fetch(url).then(r => r.text());
          const doc = new DOMParser().parseFromString(html, 'text/html');

          // 1) 페이지 인라인 스타일 → @scope 으로 격리해 head에 주입
          doc.querySelectorAll('head style').forEach(styleEl => {
            const css = styleEl.textContent || '';
            const wrapped = `@scope (${scope}) {\n${css}\n}`;
            const ns = document.createElement('style');
            ns.textContent = wrapped;
            ns.dataset.fromSlide = tab;
            document.head.appendChild(ns);
          });

          // 2) 콘텐츠 주입 (.phone-inner 의 자식들을 슬라이드로 옮김)
          const phoneInner = doc.querySelector('.phone-inner');
          slide.classList.remove('loading');
          slide.innerHTML = phoneInner ? phoneInner.innerHTML : `<div style="padding:20px;color:#888">${url} 로드 실패</div>`;

          // 3) 페이지의 inline script 들을 하나의 IIFE 로 묶어 실행 (전역 격리)
          //    + IIFE 안 top-level 함수 선언들은 window 에 expose
          //      (onclick="fn()" 같은 인라인 핸들러가 작동하려면 전역 노출 필요)
          const inlineCode = [...doc.querySelectorAll('body script:not([src])')]
            .map(s => s.textContent).join('\n;\n');
          if (inlineCode.trim()) {
            const fnNames = new Set();
            for (const m of inlineCode.matchAll(/^\s*function\s+(\w+)\s*\(/gm)) {
              fnNames.add(m[1]);
            }
            const exposeCode = [...fnNames]
              .map(n => `try{window.${n}=${n};}catch(e){}`).join('\n');
            const ns = document.createElement('script');
            ns.textContent = `;(function(){\n${inlineCode}\n${exposeCode}\n})();`;
            ns.dataset.fromSlide = tab;
            document.body.appendChild(ns);
          }
        } catch (e) {
          console.error('[loadSlide]', tab, e);
          slide.classList.remove('loading');
          slide.innerHTML = `<div style="padding:20px;color:#f88">로드 실패: ${url}</div>`;
        }
      }

      const slides = [...document.querySelectorAll('.swiper-slide[data-src]')];
      const hash = (location.hash || '').replace('#', '');
      const initialIdx = Math.max(0, TABS.indexOf(hash));

      // 초기 슬라이드는 동기적으로 먼저 로드 (Swiper init 전에 콘텐츠 준비)
      await loadSlide(slides[initialIdx]);

      const swiper = new Swiper('#app-swiper', {
        initialSlide: initialIdx,
        slidesPerView: 1,
        spaceBetween: 0,
        threshold: 8,
        speed: 280,
        resistanceRatio: 0.5,
        longSwipesRatio: 0.25,
        touchAngle: 35,
        followFinger: true,
        // 내부 스와이프/드래그가 필요한 영역에선 SPA 스와이프 비활성화
        // - .calendar: 홈 캘린더 그리드만 (hero 영역은 SPA 스와이프 허용)
        // - .chart-swipe-wrap: 마일리지 주/월/년 차트 가로 스와이프
        // - .range-slider-wrap, input[type=range]: 리스트 거리/페이스 슬라이더
        // - .month-modal, .sf-sheet, .month-list, .wheel-col: 모달/시트 내부 스크롤
        noSwipingSelector: '.calendar, .chart-swipe-wrap, .range-slider-wrap, input[type="range"], .month-modal, .sf-sheet, .month-list, .wheel-col',
        on: {
          slideChange() {
            updateActiveTab(this.activeIndex);
            history.replaceState(null, '', '#' + TABS[this.activeIndex]);
            // 인접 슬라이드 미리 로드
            preloadNeighbors(this.activeIndex);
          }
        }
      });

      function updateActiveTab(idx) {
        document.querySelectorAll('#app-tab-bar .tab-item').forEach((el, i) => {
          el.classList.toggle('active', i === idx);
        });
      }

      function preloadNeighbors(idx) {
        [idx - 1, idx + 1].forEach(i => {
          if (i >= 0 && i < slides.length) loadSlide(slides[i]);
        });
      }

      document.querySelectorAll('#app-tab-bar .tab-item').forEach((el, i) => {
        el.addEventListener('click', e => {
          e.preventDefault();
          swiper.slideTo(i);
        });
      });

      updateActiveTab(initialIdx);
      preloadNeighbors(initialIdx);

      // 외부에서 hash 바뀌면 슬라이드 동기화
      window.addEventListener('hashchange', () => {
        const h = (location.hash || '').replace('#', '');
        const idx = TABS.indexOf(h);
        if (idx >= 0 && idx !== swiper.activeIndex) swiper.slideTo(idx);
      });

      // 백그라운드에서 나머지 슬라이드 lazy 로드
      setTimeout(() => {
        slides.forEach((s, i) => { if (i !== initialIdx) loadSlide(s); });
      }, 600);

      // 탭바에 액체 유리 효과 적용 (Swiper init 후 — 탭바 dimension 결정된 시점)
      if (typeof applyLiquidGlass === 'function') {
        applyLiquidGlass(document.getElementById('app-tab-bar'), {
          borderRadius: 100,
          bezelWidth: 14,
          glassThickness: 10,
          ior: 1.45,
          scaleRatio: 1,
          blurAmt: 0.4,
          specOpacity: 0.5,
          specSat: 1.0,
          surface: 'lip',
        });
      }
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>

</html>
