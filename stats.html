<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>runit — 마일리지</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#202020">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="runit">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./transitions.js"></script>
  <style>
    /* ─── Page bg ── */
    .phone-inner {
      background: var(--asphalt-black);
    }

    /* ─── PB header button ── */
    .pb-header-btn {
      position: absolute;
      right: 20px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-2);
      display: flex;
      align-items: center;
      padding: 0;
      transition: color 0.2s, transform 0.1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .pb-header-btn:active {
      transform: scale(0.88);
      color: var(--text-1);
    }

    /* ─── Back header: glass override (styles.css = accent) ── */

    .back-btn {
      width: auto;
      height: 34px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0;
      transition: background 0.3s, color 0.3s, transform 0.1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .back-btn:active {
      transform: scale(0.92);
    }

    .back-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 400;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--cloudy-gray);
      transition: color 0.3s;
      pointer-events: none;
    }

    /* ─── Tabs ── */
    .tab-row {
      display: flex;
      padding: 12px 20px;
      flex-shrink: 0;
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 52px);
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      z-index: 9;
      transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform;
      background: rgba(34, 34, 34, 0.9);
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
    }

    /* ─── Scroll-hide header ── */
    .back-header {
      transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform;
      background: rgba(34, 34, 34, 0.9);
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
    }

    /* ─── Top section — chart + intensity ── */
    .stats-top-section {
      padding-bottom: 40px;
    }

    /* ─── Bottom section — delta + pace (dark) / runs (light) ── */
    .stats-bottom-section {
      background: transparent;
    }

    .month-runs {
      background: var(--slate-gray);
      padding: 40px 0 calc(48px + env(safe-area-inset-bottom, 0px)) 0;
    }

    /* delta · pace 텍스트 — 어두운 배경 위 */

    .delta-km {
      color: var(--text-1);
    }

    .pace-name {
      color: var(--cloudy-gray);
    }

    .tab {
      padding: 12px;
      font-size: 24px;
      font-weight: 600;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--asphalt-gray);
      cursor: pointer;
      border: none;
    }

    .tab.active {
      color: var(--text-1);
    }

    /* ─── Scroll ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-top: calc(env(safe-area-inset-top, 0px) + 128px);
      scrollbar-width: none;
    }

    .scroll-area::-webkit-scrollbar {
      display: none;
    }

    /* ════════════════════════════════════
       COMPARISON CHART
    ════════════════════════════════════ */
    .chart-block {
      margin: 20px 0;
    }

    .chart-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 20px 0 12px;
    }

    .year-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .year-arrow {
      width: 26px;
      height: 26px;
      border-radius: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--slate-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s cubic-bezier(0.16, 1, 0.3, 1);
      flex-shrink: 0;
    }

    .year-arrow:active {
      transform: scale(0.92);
    }

    .year-arrow.disabled {
      opacity: 0;
      pointer-events: none;
    }

    .chart-period-label {
      font-size: 20px;
      font-weight: 400;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--slate-gray);
      transition: color 0.3s;
    }

    .chart-avg-line-label {
      color: var(--cloudy-gray);
      font-family: 'Space Grotesk', monospace;
    }

    .avg-line-dash {
      width: 16px;
      height: 2px;
      background: repeating-linear-gradient(90deg, var(--text-2) 0 4px, transparent 4px 8px);
    }

    /* 스와이프 래퍼 */
    .chart-swipe-wrap {
      overflow: hidden;
    }

    /* 바 차트 — 회전 레이블 수용 */
    .cmp-chart {
      position: relative;
      height: 220px;
      display: flex;
      align-items: flex-end;
      gap: 0;
      padding: 0 10px;
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.28s;
    }

    .avg-line {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1.5px dashed rgba(128, 128, 128, 0.2);
      pointer-events: none;
      z-index: 1;
    }

    .cmp-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 0;
    }

    /* 슬림 바 */
    .cmp-bar {
      width: 3px;
      border-radius: 0;
      background: var(--surface-3);
      transition: background 0.3s, height 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 지나간 달 — 현재 달과 동일 컬러 */
    .cmp-col.past .cmp-bar {
      background: var(--accent);
    }

    /* 이번 달 — 풀 컬러 */
    .cmp-col.current .cmp-bar {
      background: var(--accent);
    }

    /* 미래 달 — 스텁 (고정 높이, 매우 흐리게) */
    .cmp-col.future .cmp-bar {
      background: var(--surface-3);
      opacity: 0.4;
    }

    /* 비활성화 (0km) */
    .cmp-col.inactive .cmp-bar {
      background: var(--surface-3);
    }

    .cmp-col.inactive .cmp-label {
      color: var(--text-3);
    }

    /* km 수치 — 전체 표시, past/current 동일 스타일 */
    .cmp-km {
      font-size: 14px;
      font-weight: 500;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--accent);
      white-space: nowrap;
      transition: color 0.2s, opacity 0.2s;
    }

    .cmp-col.future .cmp-km {
      display: none;
    }

    .cmp-col.future .cmp-label {
      color: var(--text-3) !important;
    }

    /* 레이블 — 기본 (주간·년간), past/current 동일 스타일 */
    .cmp-label {
      font-size: 13px;
      color: var(--text-3);
      font-family: 'Pretendard Variable', sans-serif;
      transition: color 0.3s;
      white-space: nowrap;
    }

    /* 레이블·km — 90° 회전 (월간 12개월) */
    .cmp-chart.vertical .cmp-label,
    .cmp-chart.vertical .cmp-km {
      transform: rotate(-90deg);
      /* 가로 폭을 고정하여 중앙 정렬 보장 */
      height: 38px;
      /* 회전 후 차지할 세로 공간 */
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .cmp-chart.vertical .cmp-label {
      color: var(--text-2);
      margin-top: 2px;
    }

    .cmp-chart.vertical .cmp-km {
      color: var(--accent);
      margin-bottom: 2px;
    }

    /* ════════════════════════════════════
       MONTH DETAIL (바 탭 시)
    ════════════════════════════════════ */
    .month-detail {
      margin: 0;
    }



    /* 강도 분포 */
    .intensity-breakdown {
      padding: 40px 22px 0;
    }

    .components-title {
      font-size: 16px;
      font-weight: 400;
      color: var(--slate-gray);
      margin-bottom: 12px;
      transition: color 1s;
      letter-spacing: 0;
      font-family: 'Pretendard Variable', sans-serif;
    }

    .components-title.dark {
      font-size: 16px;
      font-weight: 400;
      color: var(--asphalt-black);
      margin-bottom: 12px;
      transition: color 1s;
      letter-spacing: 0;
      font-family: 'Pretendard Variable', sans-serif;
    }

    /* 강도 스택 바 */
    .intensity-stacked-bar {
      display: flex;
      height: 60px;
      gap: 0;
      border-radius: 4px;
      overflow: hidden;
    }

    .isb-seg {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      min-width: 0;
      padding: 0 8px 8px;
      clip-path: inset(0 100% 0 0);
      transition: clip-path 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .isb-seg span {
      font-size: 16px;
      font-weight: 600;
      font-family: 'Space Grotesk', monospace;
      white-space: nowrap;
    }

    .isb-low {
      background: #646464;
    }

    .isb-low span {
      color: #1a1a1a;
    }

    .isb-mid {
      background: #2d2d2d;
    }

    .isb-mid span {
      color: var(--text-2);
    }

    .isb-high {
      background: var(--accent);
    }

    .isb-high span {
      color: #000;
    }

    .isb-axis {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .isb-axis-label {
      font-size: 15px;
      font-weight: 300;
      color: var(--cloudy-gray);
      font-family: 'Pretendard Variable', sans-serif;
      transition: color 0.3s;
    }

    /* 선택된 바만 강조 */
    .cmp-col.selected .cmp-km {
      color: var(--accent) !important;
      font-weight: 600 !important;
    }

    .cmp-col.selected .cmp-label {
      color: var(--text-1) !important;
      font-weight: 600 !important;
    }

    /* 다른 달 선택 시 — current 포함 비선택 바 모두 흐리게 */
    .cmp-chart.has-selection .cmp-col:not(.selected) {
      opacity: 0.3;
      transition: opacity 0.2s;
    }

    .cmp-chart.has-selection .cmp-col.selected {
      opacity: 1;
    }

    /* ════════════════════════════════════
       DELTA CARDS
    ════════════════════════════════════ */
    .delta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin: 0;
      padding: 0 20px 40px;
    }

    .delta-card {
      padding: 0;
      transition: background 0.3s;
    }

    .delta-card+.delta-card {
      padding-left: 20px;
    }

    .delta-km {
      font-size: 32px;
      font-weight: 400;
      transition: color 0.3s;
    }

    .delta-km.down {
      color: var(--cloudy-gray);
    }

    .delta-km.up {
      color: var(--accent);
    }

    .delta-km span {
      font-size: 14px;
      font-weight: 400;
      margin-left: 2px;
    }

    .delta-pct {
      font-size: 14px;
      margin-top: 6px;
      font-weight: 400;
      transition: color 0.3s;
    }

    .delta-pct.up {
      color: var(--accent);
    }

    .delta-pct.down {
      color: var(--slate-gray);
    }

    /* ════════════════════════════════════
       PACE 요약
    ════════════════════════════════════ */
    .pace-block {
      padding: 40px 20px;
    }

    .pace-block-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-2);
      transition: color 0.3s;
    }

    .pace-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 12px 0;
    }

    .pace-row:last-child {
      padding-bottom: 0;
    }

    .pace-row:first-of-type {
      padding-top: 0;
    }

    .pace-name {
      font-size: 16px;
      font-weight: 400;
      transition: color 0.3s;
    }

    .title-area {
      padding: 0 20px;
    }


    /* ════════════════════════════════════
       ACTIVITY LIST
    ════════════════════════════════════ */

    .month-runs-title {
      padding: 0 20px;
      margin-bottom: 10px;
    }

    /* ─── Run type dot badge ── */
    .type-race {
      background: var(--type-race-bg);
      color: var(--type-race-text);
    }

    .type-tempo {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    .type-interval {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    .type-steady {
      background: var(--type-steady-bg);
      color: var(--type-steady-text);
    }

    .type-easy {
      background: var(--type-easy-bg);
      color: var(--type-easy-text);
    }

    .type-jogging {
      background: var(--type-jog-bg);
      color: var(--type-jog-text);
    }

    .type-long {
      background: var(--type-long-bg);
      color: var(--type-long-text);
    }

    /* ─── view-all-btn in stats ── */
    #view-month .view-all-btn {
      margin: 16px 20px 0;
      width: calc(100% - 40px);
    }

    .month-runs-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-2);
      transition: color 0.3s;
    }

    .run-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .run-item:active {
      opacity: 0.5;
    }

    .run-left {
      flex: 1;
      min-width: 0;
    }

    .run-date {
      font-size: 12px;
      color: var(--text-2);
      opacity: 0.55;
      margin-bottom: 4px;
      transition: color 0.3s;
    }

    .run-name {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.3s;
    }

    .run-sub {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 3px;
      transition: color 0.3s;
    }

    .run-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .run-km {
      font-size: 20px;
      font-weight: 300;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-1);
      text-align: right;
      transition: color 0.3s;
    }

    .run-km span {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-2);
      margin-left: 2px;
    }

    .run-chevron {
      color: var(--text-2);
      opacity: 0.4;
      flex-shrink: 0;
    }

    /* ─── Shift5 Data Readout Override ── */
    .cmp-km,
    .delta-km,
    .delta-km span,
    .delta-pct,
    .run-km,
    .isb-seg span {
      font-family: 'Space Mono', ui-monospace, monospace;
      font-feature-settings: "tnum";
    }

    /* ─── Shift5 Label Tracking ── */
    .delta-vs,
    .month-runs-title,
    .pace-block-title {
      font-family: 'Space Mono', ui-monospace, monospace;
      font-weight: 400;
    }
  </style>
</head>

<body>
  <div class="phone">
    <div class="phone-inner">

      <div class="back-header">
        <button class="back-btn" onclick="goBack()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--slate-gray)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
        </button>
        <span class="back-title">마일리지</span>
        <button class="pb-header-btn" onclick="goToPB()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
            <path d="M4 22h16" />
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
          </svg>
        </button>
      </div>

      <div class="tab-row">
        <div class="tab" data-tab="week">주간</div>
        <div class="tab active" data-tab="month">월간</div>
        <div class="tab" data-tab="year">년간</div>
      </div>

      <!-- ══════════════════════════════
         WEEK VIEW (주간)
    ══════════════════════════════ -->
      <div class="scroll-area" id="view-week" style="display:none">
        <div class="chart-block">
          <div class="chart-top">
            <span class="chart-period-label">Weekly Distance</span>
            <span class="chart-avg-line-label">
              <span class="avg-line-dash"></span><span id="week-avg-label"></span>
            </span>
          </div>
          <div class="cmp-chart" id="week-chart">
            <div class="avg-line" id="week-avg-line"></div>
          </div>
        </div>

        <div class="delta-row">
          <div class="delta-card">
            <div class="components-title">지난주 대비</div>
            <div class="delta-km down">−19.7<sup>K</sup></div>
            <div class="delta-pct down">↓ 78%</div>
          </div>
          <div class="delta-card">
            <div class="components-title">8주 평균 대비</div>
            <div class="delta-km down">−16.2<span>K</span></div>
            <div class="delta-pct down">↓ 74%</div>
          </div>
        </div>
      </div><!-- /view-week -->

      <!-- ══════════════════════════════
         MONTH VIEW (월간)
    ══════════════════════════════ -->
      <div class="scroll-area" id="view-month">
        <div class="stats-top-section">
          <div class="chart-block">
            <div class="chart-top">
              <div class="year-nav">
                <button class="year-arrow" id="year-prev" onclick="changeYear(-1)">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                  </svg>
                </button>
                <span class="chart-period-label" id="month-year-label">2026년</span>
                <button class="year-arrow disabled" id="year-next" onclick="changeYear(1)">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                  </svg>
                </button>
              </div>
              <span class="chart-avg-line-label">
                <span id="month-avg-label"></span>
              </span>
            </div>
            <div class="chart-swipe-wrap" id="chart-swipe-wrap">
              <div class="cmp-chart vertical" id="month-chart">
                <div class="avg-line" id="month-avg-line"></div>
              </div>
            </div>
          </div>

          <!-- 강도 분포 -->
          <div class="month-detail" id="month-detail">
            <div class="intensity-breakdown">
              <div class="components-title">러닝 강도</div>
              <div id="detail-intensity"></div>
            </div>
          </div>
        </div><!-- /stats-top-section -->

        <div class="stats-bottom-section">
          <div class="delta-row" id="month-delta-row">
            <div class="delta-card">
              <div class="components-title">지난달 대비</div>
              <div class="delta-km down">−27.9<sup> K</sup></div>
              <div class="delta-pct down">↓ 32%</div>
            </div>
            <div class="delta-card">
              <div class="components-title">12개월 평균 대비</div>
              <div class="delta-km down">−9.4<sup> K</sup></div>

    // ══════════════════════════════════════

    // ── 연도별 월간 데이터 ──
    const YEAR_MONTH_DATA = {

        { label: '5월', km: 75.3, past: true },
        { label: '6월', km: 64.2, past: true },
        { label: '7월', km: 51.6, past: true },
        { label: '8월', km: 47.1, past: true },

    let currentYear = 2026;
    const MIN_YEAR = 2024;
    const MAX_YEAR = 2026;

    // 현재 연도 데이터 접근용 (기존 코드 호환)
    const MONTH_DATA = YEAR_MONTH_DATA[2026];

    // 년간
    const YEAR_DATA = [
      { label: '22년', km: 680 },
      { label: '23년', km: 754 },
      { label: '24년', km: 821 },
      { label: '25년', km: 783 },
      { label: '26년', km: 287.7, current: true },
    ];

    const avg = arr => Math.round(arr.reduce((s, d) => s + d.km, 0) / arr.length * 10) / 10;

    const AVG_WEEK = avg(WEEK_DATA);
    // 월간 avg — 완료된 달(past+current)만 계산
    const AVG_MONTH = avg(MONTH_DATA.filter(d => !d.future));
    const AVG_YEAR = avg(YEAR_DATA);

    // ══════════════════════════════════════
    // 차트 렌더러
    // opts.barMaxPx  : 바 최대 높이 (px)
    // opts.labelOffset: 레이블 높이 포함 바닥 오프셋 (px)
    // ══════════════════════════════════════
    function renderChart(containerId, avgLineId, data, avg, opts) {
      const BAR_MAX_PX = opts.barMaxPx || 115;
      const LABEL_OFFSET = opts.labelOffset || 20;
      const FUTURE_H = 0; // 미래 달 스텁 높이 (px)

      const container = document.getElementById(containerId);
      // maxKm — 미래(km=0) 제외하고 계산
      const activeData = data.filter(d => !d.future);
      const maxKm = Math.max(...activeData.map(d => d.km), avg * 1.05);

      // 평균선 위치
      const avgPx = Math.round(avg / maxKm * BAR_MAX_PX) + LABEL_OFFSET;
      document.getElementById(avgLineId).style.bottom = avgPx + 'px';

      // 컬럼 생성
      const cols = data.map((d, i) => {
        let cls = 'cmp-col';
        if (d.past) cls += ' past';
        if (d.current) cls += ' current';
        if (d.future) cls += ' future';
        if (d.km === 0) cls += ' inactive';

        const barPx = d.future
          ? FUTURE_H
          : Math.max(3, Math.round(d.km / maxKm * BAR_MAX_PX));

        const clickable = !d.future && d.km > 0;
        const kmDisplay = Math.floor(d.km);

        return `<div class="${cls}" data-idx="${i}" ${clickable ? 'style="cursor:pointer"' : ''}>
        ${d.km > 0 ? `<span class="cmp-km">${kmDisplay}</span>` : ''}
        <div class="cmp-bar" style="height:${barPx}px"></div>
        <span class="cmp-label">${d.label}</span>
      </div>`;
      }).join('');

      const avgLine = document.getElementById(avgLineId);
      container.innerHTML = '';
      container.appendChild(avgLine);
      container.insertAdjacentHTML('beforeend', cols);
    }

    // ── 연도 변경 ──
    function updateYearNav() {
      document.getElementById('month-year-label').textContent = currentYear + '년';
      document.getElementById('year-prev').classList.toggle('disabled', currentYear <= MIN_YEAR);
      document.getElementById('year-next').classList.toggle('disabled', currentYear >= MAX_YEAR);
    }

    function updateMonthChart(animate) {
      const data = YEAR_MONTH_DATA[currentYear];
      const activeAvg = avg(data.filter(d => !d.future));
      renderChart('month-chart', 'month-avg-line', data, activeAvg, {
        barMaxPx: 115, labelOffset: 34
      });
      document.getElementById('month-avg-label').textContent = 'avg ' + activeAvg + 'K';

      // 현재 달 인덱스로 디폴트 상세 패널 초기화
      const defaultIdx = data.findIndex(d => d.current);
      showDetailContent(defaultIdx, /* isDefault */ true);

      if (animate) animateChartIn('month-chart', 60);
    }

    // ── 바 진입 애니메이션 ──
    function animateChartIn(containerId, stagger) {
      const bars = document.querySelectorAll(`#${containerId} .cmp-bar`);
      bars.forEach((bar, i) => {
        const target = bar.style.height;
        bar.style.transition = 'none';
        bar.style.height = '0px';
        bar.style.opacity = '0';
        setTimeout(() => {
          bar.style.transition = 'height 0.55s cubic-bezier(0.16,1,0.3,1), opacity 0.3s';
          bar.style.height = target;
          bar.style.opacity = '1';
        }, i * stagger + 40);
      });
    }

    function changeYear(dir) {
      const next = currentYear + dir;
      if (next < MIN_YEAR || next > MAX_YEAR) return;

      const chart = document.getElementById('month-chart');

      // 슬라이드 아웃
      chart.style.transition = 'transform 0.22s cubic-bezier(0.4,0,1,1), opacity 0.22s';
      chart.style.transform = `translateX(${dir > 0 ? '-40px' : '40px'})`;
      chart.style.opacity = '0';

      setTimeout(() => {
        currentYear = next;
        selectedIdx = -1;
        updateYearNav();
        updateMonthChart(/* animate */ true);

        // 진입 위치 세팅 (트랜지션 없이)
        chart.style.transition = 'none';
        chart.style.transform = `translateX(${dir > 0 ? '40px' : '-40px'})`;

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            chart.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s';
            chart.style.transform = 'translateX(0)';
            chart.style.opacity = '1';
          });
        });
      }, 220);
    }

    // ══════════════════════════════════════
    // RUNS 데이터
    // ══════════════════════════════════════
    const RUNS = [
      // 4월
      { date: '2026-04-11', label: '4/11', month: 4, type: 'race', name: '2026 인천하프', dur: '1:46:42', km: 21.2, pace: '5:02', bpm: 176, spm: 174, ground: 214, stride: 107 },
      { date: '2026-04-10', label: '4/10', month: 4, type: 'jogging', name: '회복 조깅', dur: '37:05', km: 5.4, pace: '6:52', bpm: 142, spm: 163, ground: 268, stride: 88 },
      { date: '2026-04-07', label: '4/7', month: 4, type: 'tempo', name: '템포 런', dur: '38:00', km: 8.0, pace: '4:45', bpm: 169, spm: 180, ground: 208, stride: 112 },
      { date: '2026-04-05', label: '4/5', month: 4, type: 'easy', name: '이지 런', dur: '45:00', km: 7.2, pace: '6:15', bpm: 138, spm: 162, ground: 252, stride: 91 },
      { date: '2026-04-04', label: '4/4', month: 4, type: 'easy', name: '이지 런', dur: '43:04', km: 6.8, pace: '6:20', bpm: 135, spm: 160, ground: 255, stride: 89 },
      { date: '2026-04-03', label: '4/3', month: 4, type: 'easy', name: '이지 런', dur: '33:20', km: 5.0, pace: '6:40', bpm: 132, spm: 158, ground: 260, stride: 86 },
      // 3월
      { date: '2026-03-30', label: '3/30', month: 3, type: 'steady', name: '스테디 런', dur: '57:45', km: 10.5, pace: '5:30', bpm: 158, spm: 170, ground: 238, stride: 98 },
      { date: '2026-03-28', label: '3/28', month: 3, type: 'steady', name: '스테디 런', dur: '55:12', km: 9.8, pace: '5:38', bpm: 155, spm: 168, ground: 241, stride: 96 },
      { date: '2026-03-22', label: '3/22', month: 3, type: 'race', name: '서울 10K', dur: '48:40', km: 10.0, pace: '4:52', bpm: 172, spm: 177, ground: 216, stride: 105 },
      { date: '2026-03-20', label: '3/20', month: 3, type: 'steady', name: '스테디 런', dur: '1:00:40', km: 11.2, pace: '5:25', bpm: 160, spm: 171, ground: 244, stride: 100 },
      { date: '2026-03-19', label: '3/19', month: 3, type: 'jogging', name: '회복 조깅', dur: '34:00', km: 4.8, pace: '7:05', bpm: 138, spm: 161, ground: 271, stride: 85 },
      { date: '2026-03-13', label: '3/13', month: 3, type: 'easy', name: '이지 런', dur: '52:08', km: 8.5, pace: '6:08', bpm: 141, spm: 164, ground: 257, stride: 93 },
      { date: '2026-03-09', label: '3/9', month: 3, type: 'easy', name: '이지 런', dur: '38:12', km: 6.0, pace: '6:22', bpm: 136, spm: 160, ground: 262, stride: 90 },
      // 2월
      { date: '2026-02-25', label: '2/25', month: 2, type: 'long', name: '롱 런', dur: '1:44:24', km: 18.0, pace: '5:48', bpm: 155, spm: 168, ground: 245, stride: 97 },
      { date: '2026-02-18', label: '2/18', month: 2, type: 'tempo', name: '템포 런', dur: '36:30', km: 7.5, pace: '4:52', bpm: 167, spm: 178, ground: 212, stride: 110 },
      { date: '2026-02-10', label: '2/10', month: 2, type: 'steady', name: '스테디 런', dur: '52:26', km: 9.2, pace: '5:42', bpm: 152, spm: 167, ground: 242, stride: 95 },
      { date: '2026-02-02', label: '2/2', month: 2, type: 'easy', name: '이지 런', dur: '35:34', km: 5.5, pace: '6:28', bpm: 133, spm: 159, ground: 258, stride: 87 },
    ];

    function fmtDate(dateStr) {
      const [, m, d] = dateStr.split('-');
      return `${parseInt(m)}/${parseInt(d)}`;
    }

    // ══════════════════════════════════════
    // 존 설정 & 강도 분포
    // ══════════════════════════════════════

    // 사용자 설정 (추후 settings에서 변경 가능)
    const ZONE_CONFIG = {
      z1Max: 120,   // Z1: ~120
      z2Max: 140,   // Z2: 121~140
      z3Max: 160,   // Z3: 141~160
      z4Max: 175,   // Z4: 161~175
      // Z5: 176+
    };

    // 목표 비율
    const INTENSITY_TARGET = { low: 80, mid: 15, high: 5 };

    // 실제 RUNS 데이터 (avg bpm 기준)
    const RUNS_BPM = {
      // month: [bpm, bpm, ...]
      4: [176, 142, 169, 138, 135, 132],
      3: [158, 155, 172, 160, 138, 141, 136],
      2: [155, 167, 152, 133],
    };

    function bpmToIntensity(bpm) {
      if (bpm <= ZONE_CONFIG.z2Max) return 'low';
      if (bpm <= ZONE_CONFIG.z3Max) return 'mid';
      return 'high';
    }

    function calcIntensity(mIdx) {
      const bpms = RUNS_BPM[mIdx];
      if (bpms) {
        // 실제 데이터 기반 계산
        const total = bpms.length;
        let low = 0, mid = 0, high = 0;
        bpms.forEach(b => {
          const i = bpmToIntensity(b);
          if (i === 'low') low++;
          else if (i === 'mid') mid++;
          else high++;
        });
        return {
          low: Math.round(low / total * 100),
          mid: Math.round(mid / total * 100),
          high: Math.round(high / total * 100),
        };
      }
      // 실데이터 없는 달 — mock
      if (mIdx >= 6 && mIdx <= 8) return { low: 72, mid: 20, high: 8 };
      if (mIdx === 12 || mIdx <= 2) return { low: 68, mid: 24, high: 8 };
      return { low: 60, mid: 28, high: 12 };
    }

    // ══════════════════════════════════════
    // 월 상세 패널
    // ══════════════════════════════════════
    let selectedIdx = -1;

    // 패널 콘텐츠만 업데이트 (show/hide 없이)
    function showDetailContent(idx, isDefault) {
      const data = YEAR_MONTH_DATA[currentYear];
      const d = data[idx];
      if (!d || d.future || d.km === 0) return;

      const mIdx = idx + 1;
      const intensity = calcIntensity(mIdx);

      const rows = [
        { label: '저강도', pct: intensity.low, target: INTENSITY_TARGET.low },
        { label: '중강도', pct: intensity.mid, target: INTENSITY_TARGET.mid },
        { label: '고강도', pct: intensity.high, target: INTENSITY_TARGET.high },
      ];

      document.getElementById('detail-intensity').innerHTML = `
        <div class="intensity-stacked-bar">
          <div class="isb-seg isb-low"  style="width:${intensity.low}%"><span>${intensity.low}%</span></div>
          <div class="isb-seg isb-mid"  style="width:${intensity.mid}%"><span>${intensity.mid}%</span></div>
          <div class="isb-seg isb-high" style="width:${intensity.high}%"><span>${intensity.high}%</span></div>
        </div>
        <div class="isb-axis">
          <span class="isb-axis-label">저</span>
          <span class="isb-axis-label">고</span>
        </div>`;

      // 순차 reveal — 저 → 중 → 고 (clip-path 커튼)
      const baseDelay = isDefault ? 300 : 60;
      const stagger = isDefault ? 280 : 160;
      document.querySelectorAll('#detail-intensity .isb-seg').forEach((el, i) => {
        setTimeout(() => { el.style.clipPath = 'inset(0 0% 0 0)'; }, baseDelay + i * stagger);
      });

      // 활동 리스트 — list.html rowHTML과 동일
      const monthRuns = RUNS.filter(r => r.month === mIdx).sort((a, b) => a.date < b.date ? 1 : -1);
      document.getElementById('detail-runs').innerHTML = monthRuns.length
        ? `<div class="lp-list">${monthRuns.map(r => {
          const dateStr = r.date.split('-').map((p, i) => i === 0 ? p : parseInt(p)).join('.');
          const strideM = (r.stride / 100).toFixed(2);
          return `
          <div class="lp-row expanded" onclick="goTo('detail.html')">
            <div class="lp-info">
              <div class="lp-title-row">
                <div class="lp-row-left-head">
                  <div class="lp-badge type-${r.type}"></div>
                  <div class="lp-run-name">${r.name}</div>
                </div>
                <div class="lp-right-content">
                  <span class="lp-compact-km">${r.km} K</span>
                  <span class="lp-expanded-date">${dateStr}</span>
                </div>
              </div>
              <div class="lp-stats">
                <div class="lp-stats-left">
                  <div class="lp-stat">
                    <span class="lp-stat-label">시간</span>
                    <strong class="lp-stat-value">${r.dur}</strong>
                  </div>
                  <div class="lp-stat">
                    <span class="lp-stat-label">거리</span>
                    <strong class="lp-stat-value">${r.km} <span class="lp-stat-unit">K</span></strong>
                  </div>
                  <div class="lp-stat">
                    <span class="lp-stat-label">케이던스</span>
                    <strong class="lp-stat-value">${r.spm} <span class="lp-stat-unit">spm</span></strong>
                  </div>
                </div>
                <div class="lp-stats-right">
                  <div class="lp-stat">
                    <span class="lp-stat-label">심박수</span>
                    <strong class="lp-stat-value">${r.bpm} <span class="lp-stat-unit">bpm</span></strong>
                  </div>
                  <div class="lp-stat">
                    <span class="lp-stat-label">접지시간</span>
                    <strong class="lp-stat-value">${r.ground} <span class="lp-stat-unit">ms</span></strong>
                  </div>
                  <div class="lp-stat">
                    <span class="lp-stat-label">페이스</span>
                    <strong class="lp-stat-value">${r.pace} <span class="lp-stat-unit">/K</span></strong>
                  </div>
                  <div class="lp-stat">
                    <span class="lp-stat-label">보행길이</span>
                    <strong class="lp-stat-value">${strideM} <span class="lp-stat-unit">M</span></strong>
                  </div>
                </div>
              </div>
            </div>
          </div>`;
        }).join('')}</div>`
        + `<a class="view-all-btn" href="list.html">전체 목록 보기</a>`
        : `<div class="lp-row expanded"><span class="lp-stat-label">데이터 없음</span></div>`;
    }

    function selectMonth(idx) {
      const data = YEAR_MONTH_DATA[currentYear];
      const d = data[idx];
      if (!d || d.future || d.km === 0) return;

      const currentIdx = data.findIndex(d => d.current);

      // 현재 달 탭 → 디폴트 상태로 리셋
      if (idx === currentIdx) { resetToCurrentMonth(); return; }
      // 같은 비현재 달 다시 탭 → 디폴트 리셋
      if (selectedIdx === idx) { resetToCurrentMonth(); return; }

      selectedIdx = idx;

      // 바 선택 — current 포함 모두 비활성화
      const chart = document.getElementById('month-chart');
      chart.querySelectorAll('.cmp-col').forEach(c => c.classList.remove('selected'));
      chart.classList.add('has-selection');
      chart.querySelectorAll('.cmp-col')[idx].classList.add('selected');

      showDetailContent(idx, /* isDefault */ false);
    }

    function resetToCurrentMonth() {
      selectedIdx = -1;
      const chart = document.getElementById('month-chart');
      chart.classList.remove('has-selection');
      chart.querySelectorAll('.cmp-col').forEach(c => c.classList.remove('selected'));

      const data = YEAR_MONTH_DATA[currentYear];
      const currentIdx = data.findIndex(d => d.current);
      showDetailContent(currentIdx, /* isDefault */ true);
    }

    // 차트 클릭 이벤트 (한 번만 등록)
    document.getElementById('month-chart').addEventListener('click', e => {
      const col = e.target.closest('[data-idx]');
      if (col) selectMonth(parseInt(col.dataset.idx));
    });

    // 터치 스와이프
    (function () {
      let touchStartX = 0;
      let touchStartY = 0;
      let isHorizontal = null; // null = 아직 판별 안 됨
      const swipeWrap = document.querySelector('.chart-swipe-wrap');

      if (!swipeWrap) return;

      swipeWrap.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isHorizontal = null;
      }, { passive: true });

      swipeWrap.addEventListener('touchmove', (e) => {
        const dx = Math.abs(e.touches[0].clientX - touchStartX);
        const dy = Math.abs(e.touches[0].clientY - touchStartY);

        // 처음 움직임으로 방향 판별
        if (isHorizontal === null && (dx > 4 || dy > 4)) {
          isHorizontal = dx > dy;
        }

        // 수평 스와이프 확정 시 페이지 스크롤 막기
        if (isHorizontal) {
          e.preventDefault();
        }
      }, { passive: false });

      swipeWrap.addEventListener('touchend', (e) => {
        if (!isHorizontal) return;
        const dx = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(dx) > 60) {
          changeYear(dx > 0 ? 1 : -1);
        }
        isHorizontal = null;
      }, { passive: true });
    })();

    // ── 초기 렌더 (월간) — 진입 애니메이션 포함 ──
    updateYearNav();
    updateMonthChart(/* animate */ true);

    function renderWeekChart() {
      renderChart('week-chart', 'week-avg-line', WEEK_DATA, AVG_WEEK, {
        barMaxPx: 115, labelOffset: 18
      });
      document.getElementById('week-avg-label').textContent = 'avg ' + AVG_WEEK + 'K';
    }

    function renderYearChart() {
      renderChart('year-chart', 'year-avg-line', YEAR_DATA, AVG_YEAR, {
        barMaxPx: 115, labelOffset: 18
      });
      document.getElementById('year-avg-label').textContent = 'avg ' + AVG_YEAR + 'K';
    }
  </script>

  <script>
    (function () {
      const THRESHOLD = 80, MAX_PULL = 120, RESIST = 0.45;
      const scrollEl = document.querySelector('.scroll-area');
      const headerH = scrollEl ? (parseInt(getComputedStyle(scrollEl).paddingTop) || 0) : 0;
      const wrap = document.createElement('div');
      wrap.style.cssText = `position:fixed;top:${headerH}px;left:50%;transform:translateX(-50%) translateY(-52px);width:44px;height:44px;border-radius:0;background:rgba(35,35,35,0.92);backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;z-index:9;pointer-events:none;transition:transform 0.25s cubic-bezier(0.16,1,0.3,1),opacity 0.25s;opacity:0`;
      const icon = document.createElement('div');
      icon.style.cssText = 'display:flex;align-items:center;justify-content:center;';
      icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#cdcdcd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>';
      wrap.appendChild(icon);
      document.body.appendChild(wrap);
      const ks = document.createElement('style');
      ks.textContent = '@keyframes ptr-spin{to{transform:rotate(360deg)}}';
      document.head.appendChild(ks);
      if (sessionStorage.getItem('ptr-return')) {
        sessionStorage.removeItem('ptr-return');
        if (scrollEl) { scrollEl.style.transition = 'none'; scrollEl.style.transform = 'translateY(64px)'; }
        setTimeout(() => { if (scrollEl) { scrollEl.style.transition = 'transform 0.5s cubic-bezier(0.16,1,0.3,1)'; scrollEl.style.transform = ''; } }, 50);
      }
      let startY = 0, pullDist = 0, tracking = false, triggered = false;
      function scrollTop() { const el = document.querySelector('.scroll-area,.list-scroll'); return el ? el.scrollTop : window.scrollY; }
      function setPos(p, o) {
        const ty = (p / THRESHOLD) * 52 - 52;
        wrap.style.transform = `translateX(-50%) translateY(${ty}px)`;
        wrap.style.opacity = o;
        icon.style.transform = `rotate(${Math.min(p / THRESHOLD, 1) * 210}deg)`;
        if (scrollEl) scrollEl.style.transform = `translateY(${Math.max(0, p * 0.8)}px)`;
      }
      document.addEventListener('touchstart', e => { if (triggered || scrollTop() > 2) return; startY = e.touches[0].clientY; pullDist = 0; tracking = true; wrap.style.transition = 'none'; icon.style.transition = 'none'; if (scrollEl) scrollEl.style.transition = 'none'; }, { passive: true });
      document.addEventListener('touchmove', e => { if (!tracking) return; if (scrollTop() > 2) { tracking = false; return; } const dy = e.touches[0].clientY - startY; if (dy <= 0) return; pullDist = Math.min(dy * RESIST, MAX_PULL); setPos(pullDist, Math.min(pullDist / THRESHOLD, 1)); }, { passive: true });
      document.addEventListener('touchend', () => { if (!tracking) return; tracking = false; const ease = 'transform 0.25s cubic-bezier(0.16,1,0.3,1),opacity 0.25s'; wrap.style.transition = ease; icon.style.transition = 'transform 0.25s'; if (scrollEl) scrollEl.style.transition = 'transform 0.25s cubic-bezier(0.16,1,0.3,1)'; if (pullDist >= THRESHOLD) { triggered = true; wrap.style.transform = 'translateX(-50%) translateY(8px)'; wrap.style.opacity = '1'; if (scrollEl) scrollEl.style.transform = 'translateY(64px)'; icon.style.transform = 'none'; icon.style.transition = 'none'; icon.style.animation = 'ptr-spin 0.55s linear infinite'; sessionStorage.setItem('ptr-return', '1'); setTimeout(() => window.location.reload(), 700); } else { wrap.style.transform = 'translateX(-50%) translateY(-52px)'; wrap.style.opacity = '0'; if (scrollEl) scrollEl.style.transform = ''; } pullDist = 0; }, { passive: true });
    })();
  </script>
  <script>
    /* ─── Scroll-hide header + tabs ── */
    (function () {
      const header = document.querySelector('.back-header');
      const tabRow = document.querySelector('.tab-row');
      const scrollEls = document.querySelectorAll('.scroll-area');
      if (!header || !tabRow || !scrollEls.length) return;

      let lastY = 0;
      let hidden = false;
      let ticking = false;
      const THRESHOLD = 48;

      function hide() {
        if (hidden) return;
        hidden = true;
        const headerH = header.offsetHeight;
        const tabH = tabRow.offsetHeight;
        header.style.transform = `translateX(-50%) translateY(-${headerH}px)`;
        tabRow.style.transform = `translateX(-50%) translateY(-${headerH + tabH}px)`;
      }

      function show() {
        if (!hidden) return;
        hidden = false;
        header.style.transform = 'translateX(-50%)';
        tabRow.style.transform = 'translateX(-50%)';
      }

      function reset() {
        show();
        lastY = 0;
      }

      /* 모든 탭의 스크롤에 리스너 부착 */
      scrollEls.forEach(el => {
        el.addEventListener('scroll', () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const y = el.scrollTop;
            if (y > lastY && y > THRESHOLD) {
              hide();
            } else if (y < lastY) {
              show();
            }
            lastY = y;
            ticking = false;
          });
        }, { passive: true });
      });

      /* 탭 전환 시 헤더 복원 + lastY 리셋 — 탭 스크립트에서 호출 */
      window._resetScrollHide = reset;
    })();
  </script>

    function goToPB() { goTo('pb.html'); }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
