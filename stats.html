<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>runit — 마일리지</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#202020">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="runit">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./transitions.js"></script>
  <style>
    /* ─── Tabs ── */
    .tab-row {
      display: flex;
      padding: 0 10px;
      flex-shrink: 0;
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 50px);
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      z-index: 20;
      will-change: transform;
      background: rgba(34, 34, 34, 0.75);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
    }

    /* ─── Hero: 스크롤 콘텐츠 내 첫 번째 요소 ── */
    .stats-hero-bar {
      padding: 20px;
      margin-bottom: 80px;
    }

    .stats-hero-label {
      font-size: 18px;
      font-weight: 300;
      color: var(--cloudy-gray);
      font-family: 'Pretendard Variable', sans-serif;
      line-height: 1;
    }

    .stats-hero-num {
      font-size: 48px;
      font-weight: 400;
      color: var(--bone);
      line-height: 1.5;
      font-family: 'Space Grotesk', sans-serif;
    }

    .stats-hero-num sup {
      font-size: 0.5em;
      vertical-align: super;
      font-weight: 400;
      color: var(--cloudy-gray);
      margin-left: 8px;
    }


    /* ─── 러닝 종류 차트 ── */
    .type-chart {
      padding: 40px 22px 0;
    }

    .type-chart-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px;
      transition: opacity 0.3s;
    }

    .type-chart-label {
      font-size: 13px;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--slate-gray);
      width: 54px;
      flex-shrink: 0;
    }

    .type-chart-track {
      flex: 1;
      height: 4px;
      background: var(--surface-3);
      border-radius: 2px;
      overflow: hidden;
    }

    .type-chart-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
    }

    .type-chart-count {
      font-size: 12px;
      font-family: 'Space Grotesk', sans-serif;
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ─── Top section — chart + intensity ── */
    .stats-top-section {
      background: var(--asphalt-black);
      padding-bottom: 40px;
    }

    /* hero 없는 탭(월간·주간)은 tab-row 높이만큼 여백 확보 */
    #view-month .stats-top-section,
    #view-week .stats-top-section {
      padding-top: 52px;
    }

    /* 년간 hero — tab-row 아래로 위치 */
    #view-year .stats-hero-bar {
      padding-top: 72px;
    }

    /* ─── Bottom section — delta + pace (dark) / runs (light) ── */
    .stats-bottom-section {
      background: var(--asphalt-black);
    }

    .month-runs {
      background: var(--slate-gray);
      padding: 40px 0 20px 0;
    }

    /* delta · pace 텍스트 — 어두운 배경 위 */

    .pace-name {
      color: var(--cloudy-gray);
    }

    .tab {
      padding: 12px;
      font-size: 24px;
      font-weight: 500;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--asphalt-gray);
      cursor: pointer;
      border: none;
    }

    .tab.active {
      color: var(--text-1);
    }

    /* ─── Scroll ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-top: calc(env(safe-area-inset-top, 0px) + 52px);
      scrollbar-width: none;
    }

    .scroll-area::-webkit-scrollbar {
      display: none;
    }

    /* ════════════════════════════════════
       COMPARISON CHART
    ════════════════════════════════════ */
    .chart-block {
      margin: 20px 0;
    }

    .chart-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 20px;
    }


    .year-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .year-arrow {
      width: 26px;
      height: 26px;
      border-radius: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--slate-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s cubic-bezier(0.16, 1, 0.3, 1);
      flex-shrink: 0;
    }

    .year-arrow:active {
      transform: scale(0.92);
    }

    .year-arrow.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .chart-period-label {
      font-size: 20px;
      font-weight: 400;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--slate-gray);
      transition: color 0.3s;
    }

    .chart-avg-line-label {
      color: var(--cloudy-gray);
      font-family: 'Space Grotesk', monospace;
    }

    .avg-line-dash {
      width: 16px;
      height: 2px;
      background: repeating-linear-gradient(90deg, var(--text-2) 0 4px, transparent 4px 8px);
    }

    /* 스와이프 래퍼 */
    .chart-swipe-wrap {
      overflow: hidden;
    }

    /* 바 차트 — 회전 레이블 수용 */
    .cmp-chart {
      position: relative;
      height: 220px;
      display: flex;
      align-items: flex-end;
      gap: 0;
      padding: 0 10px;
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.28s;
    }

    .avg-line {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1.5px dashed rgba(128, 128, 128, 0.2);
      pointer-events: none;
      z-index: 1;
    }

    .cmp-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 0;
    }

    /* 슬림 바 */
    .cmp-bar {
      width: 3px;
      border-radius: 0;
      background: var(--surface-3);
      transition: background 0.3s, height 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 지나간 달 — 현재 달과 동일 컬러 */
    .cmp-col.past .cmp-bar {
      background: var(--accent);
    }

    /* 이번 달 — 풀 컬러 */
    .cmp-col.current .cmp-bar {
      background: var(--accent);
    }

    /* 미래 달 — 스텁 (고정 높이, 매우 흐리게) */
    .cmp-col.future .cmp-bar {
      background: var(--surface-3);
      opacity: 0.4;
    }

    /* 비활성화 (0km) */
    .cmp-col.inactive .cmp-bar {
      background: var(--surface-3);
    }

    .cmp-col.inactive .cmp-label {
      color: var(--text-3);
    }

    /* km 수치 — 전체 표시, past/current 동일 스타일 */
    .cmp-km {
      font-size: 14px;
      font-weight: 500;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--accent);
      white-space: nowrap;
      transition: color 0.2s, opacity 0.2s;
    }

    .cmp-col.future .cmp-km {
      display: none;
    }

    .cmp-col.future .cmp-label {
      color: var(--text-3) !important;
    }

    /* 레이블 — 기본 (주간·년간), past/current 동일 스타일 */
    .cmp-label {
      font-size: 13px;
      color: var(--text-3);
      font-family: 'Pretendard Variable', sans-serif;
      transition: color 0.3s;
      white-space: nowrap;
    }

    /* 레이블·km — 90° 회전 (월간 12개월) */
    .cmp-chart.vertical .cmp-label,
    .cmp-chart.vertical .cmp-km {
      transform: rotate(-90deg);
      /* 가로 폭을 고정하여 중앙 정렬 보장 */
      height: 38px;
      /* 회전 후 차지할 세로 공간 */
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .cmp-chart.vertical .cmp-label {
      color: var(--slate-gray);
      font-weight: 300;
    }

    .cmp-chart.vertical .cmp-km {
      color: var(--accent);
    }

    /* ════════════════════════════════════
       MONTH DETAIL (바 탭 시)
    ════════════════════════════════════ */
    .month-detail {
      margin: 0;
    }



    /* 강도 분포 */
    .intensity-breakdown {
      padding: 40px 22px 0;
    }

    .components-title {
      font-size: 16px;
      font-weight: 400;
      color: var(--cloudy-gray);
      margin-bottom: 12px;
      transition: color 1s;
      letter-spacing: 0;
      font-family: 'Pretendard Variable', sans-serif;
    }

    .components-title.dark {
      font-size: 16px;
      font-weight: 400;
      color: var(--asphalt-black);
      margin-bottom: 12px;
      transition: color 1s;
      letter-spacing: 0;
      font-family: 'Pretendard Variable', sans-serif;
    }

    /* 강도 스택 바 */
    .intensity-stacked-bar {
      display: flex;
      height: 60px;
      gap: 0;
      border-radius: 4px;
      overflow: hidden;
    }

    .isb-seg {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      min-width: 0;
      padding: 0 8px 8px;
      clip-path: inset(0 100% 0 0);
      transition: clip-path 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .isb-seg span {
      font-size: 16px;
      font-weight: 600;
      font-family: 'Space Grotesk', monospace;
      white-space: nowrap;
    }

    .isb-low {
      background: #646464;
    }

    .isb-low span {
      color: var(--asphalt-black);
    }

    .isb-mid {
      background: #2d2d2d;
    }

    .isb-mid span {
      color: var(--text-2);
    }

    .isb-high {
      background: var(--accent);
    }

    .isb-high span {
      color: #000;
    }

    .isb-axis {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .isb-axis-label {
      font-size: 15px;
      font-weight: 300;
      color: var(--slate-gray);
      font-family: 'Pretendard Variable', sans-serif;
      transition: color 0.3s;
    }

    /* 선택된 바만 강조 */
    .cmp-col.selected .cmp-km {
      color: var(--accent) !important;
      font-weight: 600 !important;
    }

    .cmp-col.selected .cmp-label {
      color: var(--text-1) !important;
      font-weight: 600 !important;
    }

    /* 다른 달 선택 시 — current 포함 비선택 바 모두 흐리게 */
    .cmp-chart.has-selection .cmp-col:not(.selected) {
      opacity: 0.3;
      transition: opacity 0.2s;
    }

    .cmp-chart.has-selection .cmp-col.selected {
      opacity: 1;
    }

    /* ════════════════════════════════════
       DELTA CARDS
    ════════════════════════════════════ */
    .delta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin: 0;
      padding: 30px 20px;
      /*-- background: var(--slate-gray); --*/
      border-top: #353535 1px solid;
    }

    .delta-card {
      padding: 0;
      transition: background 0.3s;
    }

    .delta-card+.delta-card {
      padding-left: 20px;
    }

    .delta-km {
      font-size: 32px;
      font-weight: 400;
      transition: color 0.3s;
      color: var(--bone);
      line-height: 1;
    }

    .delta-km span {
      font-size: 14px;
      font-weight: 400;
      margin-left: 2px;
    }

    .delta-pct {
      font-size: 14px;
      margin-top: 6px;
      font-weight: 400;
      transition: color 0.3s;
    }

    .delta-pct.up {
      color: var(--accent);
    }

    .delta-pct.down {
      color: var(--cloudy-gray);
    }

    /* ════════════════════════════════════
       PACE 요약
    ════════════════════════════════════ */
    .pace-block {
      padding: 40px 20px;
    }

    .pace-block-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-2);
      transition: color 0.3s;
    }

    .pace-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 12px 0;
    }

    .pace-row:last-child {
      padding-bottom: 0;
    }

    .pace-row:first-of-type {
      padding-top: 0;
    }

    .pace-name {
      font-size: 16px;
      font-weight: 400;
      transition: color 0.3s;
    }

    .title-area {
      padding: 0 20px;
    }


    /* ════════════════════════════════════
       ACTIVITY LIST
    ════════════════════════════════════ */

    .month-runs-title {
      padding: 0 20px;
      margin-bottom: 10px;
    }

    /* ─── Run type dot badge ── */
    .type-race {
      background: var(--type-race-bg);
      color: var(--type-race-text);
    }

    .type-tempo {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    .type-interval {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    .type-steady {
      background: var(--type-steady-bg);
      color: var(--type-steady-text);
    }

    .type-easy {
      background: var(--type-easy-bg);
      color: var(--type-easy-text);
    }

    .type-jogging {
      background: var(--type-jog-bg);
      color: var(--type-jog-text);
    }

    .type-long {
      background: var(--type-long-bg);
      color: var(--type-long-text);
    }

    .type-tt {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    /* ─── 전체 러닝 활동 FAB — 리스트 뒤에 고정, 스크롤로 드러남 ── */
    .list-fab {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
      /* JS로 월간 탭에서만 표시 */
      align-items: center;
      justify-content: space-between;
      padding: 50px 20px calc(env(safe-area-inset-bottom, 0px)) 26px;
      background-color: var(--accent);
      color: #202020;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    /* FAB 위 갭 영역도 accent 컬러 채우기 */
    .list-fab::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 100%;
      height: 90px;
      background: var(--accent);
    }

    .list-fab:active {
      opacity: 0.8;
    }

    .list-fab-title {
      font-size: 20px;
      font-weight: 500;
      font-family: 'Pretendard Variable', sans-serif;
      color: #202020;
    }

    /* z-index 레이어: 헤더(30) > 탭(20) > FAB(15) > scroll-area(10) */
    .back-header {
      z-index: 30;
    }

    .list-fab {
      z-index: 15;
    }

    .scroll-area {
      position: relative;
      z-index: 10;
    }

    /* 전체 탭: 콘텐츠가 FAB 위까지 스크롤될 수 있도록 하단 여백 */
    #view-month,
    #view-week,
    #view-year {
      padding-bottom: 90px;
    }

    .month-runs-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-2);
      transition: color 0.3s;
    }

    .run-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .run-item:active {
      opacity: 0.5;
    }

    .run-left {
      flex: 1;
      min-width: 0;
    }

    .run-date {
      font-size: 12px;
      color: var(--text-2);
      opacity: 0.55;
      margin-bottom: 4px;
      transition: color 0.3s;
    }

    .run-name {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.3s;
    }

    .run-sub {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 3px;
      transition: color 0.3s;
    }

    .run-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .run-km {
      font-size: 20px;
      font-weight: 300;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-1);
      text-align: right;
      transition: color 0.3s;
    }

    .run-km span {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-2);
      margin-left: 2px;
    }

    .run-chevron {
      color: var(--text-2);
      opacity: 0.4;
      flex-shrink: 0;
    }

    /* ─── Shift5 Data Readout Override ── */
    .cmp-km,
    .delta-km,
    .delta-km span,
    .delta-pct,
    .run-km,
    .isb-seg span {
      font-family: 'Space Mono', ui-monospace, monospace;
      font-feature-settings: "tnum";
    }

    /* ─── Shift5 Label Tracking ── */
    .delta-vs,
    .month-runs-title,
    .pace-block-title {
      font-family: 'Space Mono', ui-monospace, monospace;
      font-weight: 400;
    }
  </style>
</head>

<body>
  <div class="phone">
    <div class="phone-inner">

      <div class="back-header back-header--dark" id="back-header">
        <button class="back-btn" onclick="goBack('runit-home.html')">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--slate-gray)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
        </button>
        <span class="back-title">마일리지</span>
        <button class="header-action-btn" onclick="goToPB()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
            <path d="M4 22h16" />
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
          </svg>
        </button>
      </div>

      <div class="tab-row">
        <div class="tab" data-tab="week">주간</div>
        <div class="tab active" data-tab="month">월간</div>
        <div class="tab" data-tab="year">년간</div>
      </div>

      <!-- ══════════════════════════════
         WEEK VIEW (주간)
    ══════════════════════════════ -->
      <div class="scroll-area" id="view-week" style="display:none">
        <div class="stats-top-section">
          <div class="chart-block">
            <div class="chart-top">
              <div class="year-nav">
                <span class="chart-period-label" id="week-period-label">3.9 — 5.25</span>
                <button class="year-arrow" id="week-period-prev" onclick="changeWeekPeriod(-1)">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                  </svg>
                </button>
                <button class="year-arrow disabled" id="week-period-next" onclick="changeWeekPeriod(1)">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                  </svg>
                </button>
              </div>
              <span class="chart-avg-line-label">
                <span class="avg-line-dash"></span><span id="week-avg-label"></span>

      const LABEL_OFFSET = opts.labelOffset || 20;
      const FUTURE_H = 0; // 미래 달 스텁 높이 (px)

      // maxKm — 미래(km=0) 제외하고 계산
      const activeData = data.filter(d => !d.future);
      const maxKm = Math.max(...activeData.map(d => d.km), avg * 1.05);

      // 평균선 위치
      const avgPx = Math.round(avg / maxKm * BAR_MAX_PX) + LABEL_OFFSET;
      document.getElementById(avgLineId).style.bottom = avgPx + 'px';

      // 컬럼 생성
      const cols = data.map((d, i) => {
        let cls = 'cmp-col';
        if (d.past) cls += ' past';
        if (d.current) cls += ' current';
        if (d.future) cls += ' future';
        if (d.km === 0) cls += ' inactive';

        const barPx = d.future
          ? FUTURE_H
          : Math.max(3, Math.round(d.km / maxKm * BAR_MAX_PX));

        const clickable = !d.future && d.km > 0;
        const kmDisplay = Math.floor(d.km);

        return `<div class="${cls}" data-idx="${i}" ${clickable ? 'style="cursor:pointer"' : ''}>

        <div class="cmp-bar" style="height:${barPx}px"></div>
        <span class="cmp-label">${d.label}</span>
      </div>`;

      const avgLine = document.getElementById(avgLineId);
      container.innerHTML = '';
      container.appendChild(avgLine);
      container.insertAdjacentHTML('beforeend', cols);

          bar.style.height = target;
          bar.style.opacity = '1';
        }, i * stagger + 40);
      });

      { date: '2026-02-10', label: '2/10', month: 2, type: 'steady', name: '스테디 런', dur: '52:26', km: 9.2, pace: '5:42', bpm: 152, spm: 167, ground: 242, stride: 95 },
      { date: '2026-02-02', label: '2/2', month: 2, type: 'easy', name: '이지 런', dur: '35:34', km: 5.5, pace: '6:28', bpm: 133, spm: 159, ground: 258, stride: 87 },
    ];

    function fmtDate(dateStr) {
      const [, m, d] = dateStr.split('-');
      return `${parseInt(m)}/${parseInt(d)}`;
    }

    // ══════════════════════════════════════
    // 존 설정 & 강도 분포
    // ══════════════════════════════════════

    // 사용자 설정 (추후 settings에서 변경 가능)
    const ZONE_CONFIG = {
      z1Max: 120,   // Z1: ~120
      z2Max: 140,   // Z2: 121~140
      z3Max: 160,   // Z3: 141~160
      z4Max: 175,   // Z4: 161~175
      // Z5: 176+
    };

    // 목표 비율
    const INTENSITY_TARGET = { low: 80, mid: 15, high: 5 };

    // 실제 RUNS 데이터 (avg bpm 기준)
    const RUNS_BPM = {
      // month: [bpm, bpm, ...]
      4: [176, 142, 169, 138, 135, 132],
      3: [158, 155, 172, 160, 138, 141, 136],
      2: [155, 167, 152, 133],
    };

    function bpmToIntensity(bpm) {
      if (bpm <= ZONE_CONFIG.z2Max) return 'low';
      if (bpm <= ZONE_CONFIG.z3Max) return 'mid';
      return 'high';
    }

    function calcIntensity(mIdx) {
      const bpms = RUNS_BPM[mIdx];
      if (bpms) {
        // 실제 데이터 기반 계산
        const total = bpms.length;
        let low = 0, mid = 0, high = 0;
        bpms.forEach(b => {
          const i = bpmToIntensity(b);
          if (i === 'low') low++;
          else if (i === 'mid') mid++;
          else high++;
        });
        return {
          low: Math.round(low / total * 100),
          mid: Math.round(mid / total * 100),
          high: Math.round(high / total * 100),
        };
      }
      // 실데이터 없는 달 — mock
      if (mIdx >= 6 && mIdx <= 8) return { low: 72, mid: 20, high: 8 };
      if (mIdx === 12 || mIdx <= 2) return { low: 68, mid: 24, high: 8 };
      return { low: 60, mid: 28, high: 12 };
    }

    // ══════════════════════════════════════
    // 월 상세 패널
    // ══════════════════════════════════════
    let selectedIdx = -1;

    // 패널 콘텐츠만 업데이트 (show/hide 없이)
    function showDetailContent(idx, isDefault) {
      const data = YEAR_MONTH_DATA[currentYear];
      const d = data[idx];
      if (!d || d.future || d.km === 0) return;

      const mIdx = idx + 1;
      const intensity = calcIntensity(mIdx);

      const rows = [
        { label: '저강도', pct: intensity.low, target: INTENSITY_TARGET.low },
        { label: '중강도', pct: intensity.mid, target: INTENSITY_TARGET.mid },
        { label: '고강도', pct: intensity.high, target: INTENSITY_TARGET.high },
      ];

      document.getElementById('detail-intensity').innerHTML = `
        <div class="intensity-stacked-bar">
          <div class="isb-seg isb-low"  style="width:${intensity.low}%"><span>${intensity.low}%</span></div>
          <div class="isb-seg isb-mid"  style="width:${intensity.mid}%"><span>${intensity.mid}%</span></div>
          <div class="isb-seg isb-high" style="width:${intensity.high}%"><span>${intensity.high}%</span></div>
        </div>
        <div class="isb-axis">
          <span class="isb-axis-label">저</span>
          <span class="isb-axis-label">고</span>
        </div>`;

      // 순차 reveal — 저 → 중 → 고 (clip-path 커튼)
      const baseDelay = isDefault ? 300 : 60;
      const stagger = isDefault ? 280 : 160;
      document.querySelectorAll('#detail-intensity .isb-seg').forEach((el, i) => {
        setTimeout(() => { el.style.clipPath = 'inset(0 0% 0 0)'; }, baseDelay + i * stagger);
      });

    }

    function selectMonth(idx) {
      const data = YEAR_MONTH_DATA[currentYear];
      const d = data[idx];
      if (!d || d.future || d.km === 0) return;

      const currentIdx = data.findIndex(d => d.current);

      // 현재 달 탭 → 디폴트 상태로 리셋
      if (idx === currentIdx) { resetToCurrentMonth(); return; }
      // 같은 비현재 달 다시 탭 → 디폴트 리셋
      if (selectedIdx === idx) { resetToCurrentMonth(); return; }

      selectedIdx = idx;

      // 바 선택 — current 포함 모두 비활성화
      const chart = document.getElementById('month-chart');
      chart.querySelectorAll('.cmp-col').forEach(c => c.classList.remove('selected'));
      chart.classList.add('has-selection');
      chart.querySelectorAll('.cmp-col')[idx].classList.add('selected');

      showDetailContent(idx, /* isDefault */ false);
    }

    function resetToCurrentMonth() {
      selectedIdx = -1;
      const chart = document.getElementById('month-chart');
      chart.classList.remove('has-selection');
      chart.querySelectorAll('.cmp-col').forEach(c => c.classList.remove('selected'));

      const data = YEAR_MONTH_DATA[currentYear];
      const currentIdx = data.findIndex(d => d.current);
      showDetailContent(currentIdx, /* isDefault */ true);
    }

    // 차트 클릭 이벤트 (한 번만 등록)
    document.getElementById('month-chart').addEventListener('click', e => {
      const col = e.target.closest('[data-idx]');
      if (col) selectMonth(parseInt(col.dataset.idx));
    });

    // 터치 스와이프
    (function () {
      let touchStartX = 0;
      let touchStartY = 0;
      let isHorizontal = null; // null = 아직 판별 안 됨
      const swipeWrap = document.getElementById('chart-swipe-wrap');

      if (!swipeWrap) return;

      swipeWrap.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isHorizontal = null;
      }, { passive: true });

      swipeWrap.addEventListener('touchmove', (e) => {
        const dx = Math.abs(e.touches[0].clientX - touchStartX);
        const dy = Math.abs(e.touches[0].clientY - touchStartY);

        // 처음 움직임으로 방향 판별
        if (isHorizontal === null && (dx > 4 || dy > 4)) {
          isHorizontal = dx > dy;
        }

        // 수평 스와이프 확정 시 페이지 스크롤 막기
        if (isHorizontal) {
          e.preventDefault();
        }
      }, { passive: false });

      swipeWrap.addEventListener('touchend', (e) => {
        if (!isHorizontal) return;
        const dx = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(dx) > 60) {
          changeYear(dx > 0 ? 1 : -1);
        }
        isHorizontal = null;
      }, { passive: true });
    })();

    // ── 초기 렌더 (월간) — 진입 애니메이션 포함 ──
    updateYearNav();
    updateMonthChart(/* animate */ true);

    // ── 런 카드 HTML 공통 템플릿 ──
    function runRowHTML(r) {
      const dateStr = r.date.split('-').map((p, i) => i === 0 ? p : parseInt(p)).join('.');
      const strideM = (r.stride / 100).toFixed(2);
      return `<div class="lp-row expanded" onclick="goTo('detail.html')">
        <div class="lp-info">
          <div class="lp-title-row">
            <div class="lp-row-left-head">
              <div class="lp-badge type-${r.type}"></div>
              <div class="lp-run-name">${r.name}</div>
            </div>
            <div class="lp-right-content">
              <span class="lp-compact-km">${r.km} K</span>
              <span class="lp-expanded-date">${dateStr}</span>
            </div>
          </div>
          <div class="lp-stats">
            <div class="lp-stats-left">
              <div class="lp-stat"><span class="lp-stat-label">시간</span><strong class="lp-stat-value">${r.dur}</strong></div>
              <div class="lp-stat"><span class="lp-stat-label">거리</span><strong class="lp-stat-value">${r.km} <span class="lp-stat-unit">K</span></strong></div>
              <div class="lp-stat"><span class="lp-stat-label">케이던스</span><strong class="lp-stat-value">${r.spm} <span class="lp-stat-unit">spm</span></strong></div>
            </div>
            <div class="lp-stats-right">
              <div class="lp-stat"><span class="lp-stat-label">심박수</span><strong class="lp-stat-value">${r.bpm} <span class="lp-stat-unit">bpm</span></strong></div>
              <div class="lp-stat"><span class="lp-stat-label">접지시간</span><strong class="lp-stat-value">${r.ground} <span class="lp-stat-unit">ms</span></strong></div>
              <div class="lp-stat"><span class="lp-stat-label">페이스</span><strong class="lp-stat-value">${r.pace} <span class="lp-stat-unit">/K</span></strong></div>
              <div class="lp-stat"><span class="lp-stat-label">보행길이</span><strong class="lp-stat-value">${strideM} <span class="lp-stat-unit">M</span></strong></div>
            </div>
          </div>
        </div>
      </div>`;
    }

    function renderRunsList(containerId, runs) {
      const el = document.getElementById(containerId);
      if (!el) return;
      const sorted = [...runs].sort((a, b) => a.date < b.date ? 1 : -1);
      el.innerHTML = sorted.length
        ? `<div class="lp-list">${sorted.map(runRowHTML).join('')}</div>`
        : `<div class="lp-row expanded"><span class="lp-stat-label">데이터 없음</span></div>`;
    }

    // ── 러닝 종류 차트 ──
    function renderTypeChart(containerId, runs) {
      const RUN_TYPES = [
        { key: 'race', label: 'Race', color: 'var(--type-race-text)' },
        { key: 'tt', label: 'TT', color: 'var(--type-dark-bg)' },
        { key: 'tempo', label: 'Tempo', color: 'var(--type-dark-bg)' },
        { key: 'interval', label: 'Interval', color: 'var(--type-dark-bg)' },
        { key: 'steady', label: 'Steady', color: 'var(--type-steady-bg)' },
        { key: 'easy', label: 'Easy', color: 'var(--type-easy-bg)' },
        { key: 'jogging', label: 'Jogging', color: 'var(--type-jog-bg)' },
        { key: 'long', label: 'LSD', color: 'var(--type-long-bg)' },
      ];
      const el = document.getElementById(containerId);
      if (!el) return;
      const counts = {};
      RUN_TYPES.forEach(t => counts[t.key] = 0);
      runs.forEach(r => { if (r.type in counts) counts[r.type]++; });
      const maxCount = Math.max(...RUN_TYPES.map(t => counts[t.key]), 1);
      el.innerHTML = RUN_TYPES.map(t => {
        const count = counts[t.key];
        const pct = Math.round(count / maxCount * 100);
        const dimStyle = count === 0 ? ' style="opacity:0.25"' : '';
        return `<div class="type-chart-row"${dimStyle}>
          <span class="type-chart-label">${t.label}</span>
          <div class="type-chart-track">
            <div class="type-chart-fill" data-pct="${pct}" style="width:0;background:${t.color}"></div>
          </div>
          <span class="type-chart-count" style="color:${count > 0 ? t.color : 'transparent'}">${count}</span>
        </div>`;
      }).join('');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.querySelectorAll('.type-chart-fill').forEach(bar => {
          bar.style.transition = 'width 0.55s cubic-bezier(0.16, 1, 0.3, 1)';
          bar.style.width = bar.dataset.pct + '%';
        });
      }));
    }

    function renderIntensityBar(containerId, bpms, animate) {
      const el = document.getElementById(containerId);
      if (!el || !bpms.length) return;
      const total = bpms.length;
      let low = 0, mid = 0, high = 0;
      bpms.forEach(b => {
        const z = bpmToIntensity(b);
        if (z === 'low') low++;
        else if (z === 'mid') mid++;
        else high++;
      });
      const lp = Math.round(low / total * 100);
      const mp = Math.round(mid / total * 100);
      const hp = 100 - lp - mp;
      el.innerHTML = `
        <div class="intensity-stacked-bar">
          <div class="isb-seg isb-low"  style="width:${lp}%"><span>${lp}%</span></div>
          <div class="isb-seg isb-mid"  style="width:${mp}%"><span>${mp}%</span></div>
          <div class="isb-seg isb-high" style="width:${hp}%"><span>${hp}%</span></div>
        </div>
        <div class="isb-axis">
          <span class="isb-axis-label">저</span>
          <span class="isb-axis-label">고</span>
        </div>`;
      if (animate) {
        el.querySelectorAll('.isb-seg').forEach((seg, i) => {
          setTimeout(() => { seg.style.clipPath = 'inset(0 0% 0 0)'; }, 300 + i * 280);
        });
      }
    }

    // ══════════════════════════════════════
    // 주간 네비게이션
    // ══════════════════════════════════════
    function updateWeekPeriodNav() {
      document.getElementById('week-period-label').textContent = WEEK_PERIOD_DATA[currentWeekPeriodIdx].label;
      document.getElementById('week-period-prev').classList.toggle('disabled', currentWeekPeriodIdx <= MIN_WEEK_PERIOD);
      document.getElementById('week-period-next').classList.toggle('disabled', currentWeekPeriodIdx >= MAX_WEEK_PERIOD);
    }

    function updateWeekChart(animate) {
      const period = WEEK_PERIOD_DATA[currentWeekPeriodIdx];
      const data = period.weeks;
      const periodAvg = avg(data.filter(d => !d.future && d.km > 0));
      renderChart('week-chart', 'week-avg-line', data, periodAvg, { barMaxPx: 115, labelOffset: 34 });
      document.getElementById('week-avg-label').textContent = 'avg ' + periodAvg + 'K';
      const bpms = currentWeekPeriodIdx === 2 ? RUNS_BPM[4] : period.bpms;
      renderIntensityBar('week-intensity', bpms, animate);
      const weekRuns = currentWeekPeriodIdx === 2 ? RUNS.filter(r => r.date >= '2026-03-09') : [];
      renderTypeChart('week-type-chart', weekRuns);
      if (animate) animateChartIn('week-chart', 60);
    }

    function changeWeekPeriod(dir) {
      const next = currentWeekPeriodIdx + dir;
      if (next < MIN_WEEK_PERIOD || next > MAX_WEEK_PERIOD) return;
      const chart = document.getElementById('week-chart');
      chart.style.transition = 'transform 0.22s cubic-bezier(0.4,0,1,1), opacity 0.22s';
      chart.style.transform = `translateX(${dir > 0 ? '-40px' : '40px'})`;
      chart.style.opacity = '0';
      setTimeout(() => {
        currentWeekPeriodIdx = next;
        updateWeekPeriodNav();
        updateWeekChart(true);
        chart.style.transition = 'none';
        chart.style.transform = `translateX(${dir > 0 ? '40px' : '-40px'})`;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          chart.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s';
          chart.style.transform = 'translateX(0)';
          chart.style.opacity = '1';
        }));
      }, 220);
    }

    function renderWeekChart() {
      updateWeekPeriodNav();
      updateWeekChart(true);
    }

    // ══════════════════════════════════════
    // 년간 네비게이션
    // ══════════════════════════════════════
    function updateYearPeriodNav() {
      document.getElementById('year-period-label').textContent = YEAR_PERIOD_DATA[currentYearPeriodIdx].label;
      document.getElementById('year-period-prev').classList.toggle('disabled', currentYearPeriodIdx <= MIN_YEAR_PERIOD);
      document.getElementById('year-period-next').classList.toggle('disabled', currentYearPeriodIdx >= MAX_YEAR_PERIOD);
    }

    function updateYearChart(animate) {
      const period = YEAR_PERIOD_DATA[currentYearPeriodIdx];
      const data = period.years;
      const periodAvg = avg(data.filter(d => !d.future && d.km > 0));
      renderChart('year-chart', 'year-avg-line', data, periodAvg, { barMaxPx: 115, labelOffset: 34 });
      document.getElementById('year-avg-label').textContent = 'avg ' + periodAvg + 'K';
      const bpms = period.bpms || RUNS.map(r => r.bpm);
      renderIntensityBar('year-intensity', bpms, animate);
      const yearRuns = currentYearPeriodIdx === 1 ? RUNS : [];
      renderTypeChart('year-type-chart', yearRuns);
      if (animate) animateChartIn('year-chart', 60);
    }

    function changeYearPeriod(dir) {
      const next = currentYearPeriodIdx + dir;
      if (next < MIN_YEAR_PERIOD || next > MAX_YEAR_PERIOD) return;
      const chart = document.getElementById('year-chart');
      chart.style.transition = 'transform 0.22s cubic-bezier(0.4,0,1,1), opacity 0.22s';
      chart.style.transform = `translateX(${dir > 0 ? '-40px' : '40px'})`;
      chart.style.opacity = '0';
      setTimeout(() => {
        currentYearPeriodIdx = next;
        updateYearPeriodNav();
        updateYearChart(true);
        chart.style.transition = 'none';
        chart.style.transform = `translateX(${dir > 0 ? '40px' : '-40px'})`;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          chart.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s';
          chart.style.transform = 'translateX(0)';
          chart.style.opacity = '1';
        }));
      }, 220);
    }

    function renderYearChart() {
      updateYearPeriodNav();
      updateYearChart(true);
    }

    // ── 주간/년간 스와이프 핸들러 ──
    function addChartSwipe(wrapperId, changeFn) {
      let startX = 0, startY = 0, isHorizontal = null;
      const wrap = document.getElementById(wrapperId);
      if (!wrap) return;
      wrap.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isHorizontal = null;
      }, { passive: true });
      wrap.addEventListener('touchmove', e => {
        const dx = Math.abs(e.touches[0].clientX - startX);
        const dy = Math.abs(e.touches[0].clientY - startY);
        if (isHorizontal === null && (dx > 4 || dy > 4)) isHorizontal = dx > dy;
        if (isHorizontal) e.preventDefault();
      }, { passive: false });
      wrap.addEventListener('touchend', e => {
        if (!isHorizontal) return;
        const dx = startX - e.changedTouches[0].clientX;
        if (Math.abs(dx) > 60) changeFn(dx > 0 ? 1 : -1);
      }, { passive: true });
    }
    addChartSwipe('week-chart-swipe-wrap', changeWeekPeriod);
    addChartSwipe('year-chart-swipe-wrap', changeYearPeriod);
  </script>

  <script>
    /* ─── 탭 scroll-hide + hero tracking ── */
    (function () {
      const tabRow = document.querySelector('.tab-row');
      const backHeader = document.getElementById('back-header');
      const scrollEls = document.querySelectorAll('.scroll-area');
      if (!tabRow || !scrollEls.length) return;

      let lastY = 0;
      let hidden = false;
      let animating = false;
      let ticking = false;

      function heroH() {
        const el = document.querySelector('.scroll-area:not([style*="none"]) .stats-hero-bar')
          || document.querySelector('.stats-hero-bar');
        return el ? el.offsetHeight : 0;
      }

      /* 히어로 추적 — tab-row 고정 위치 유지 */
      function track(y) {
        if (hidden || animating) return;
        tabRow.style.transition = 'none';
        tabRow.style.transform = 'translateX(-50%) translateY(0)';
      }

      /* 히어로가 완전히 사라지고 추가 80px 내린 뒤에 숨김 */
      function hide() {
        if (hidden) return;
        hidden = true;
        animating = true;
        const tabBottom = tabRow.getBoundingClientRect().bottom;
        tabRow.style.transition = 'transform 0.35s cubic-bezier(0.4, 0, 1, 1)';
        tabRow.style.transform = `translateX(-50%) translateY(-${tabBottom}px)`;
        setTimeout(() => { animating = false; }, 380);
      }

      /* 스크롤 업 시 복귀 */
      function show(y) {
        if (!hidden) return;
        hidden = false;
        animating = true;
        tabRow.style.transition = 'transform 0.35s cubic-bezier(0.16, 1, 0.3, 1)';
        tabRow.style.transform = 'translateX(-50%) translateY(0)';
        setTimeout(() => { animating = false; }, 380);
      }

      function reset() {
        hidden = animating = false;
        track(0);
      }

      scrollEls.forEach(el => {
        el.addEventListener('scroll', () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const y = el.scrollTop;
            const hideAt = heroH() + 80;   /* 히어로 사라진 뒤 80px 더 내려야 숨김 */
            if (y > lastY && y > hideAt) hide();
            else if (y < lastY && hidden) show(y);
            else track(y);
            lastY = y;
            ticking = false;
          });
        }, { passive: true });
      });

      track(0);
      window._resetScrollHide = reset;
    })();
  </script>
  <script>
    function goToPB() { goTo('pb.html'); }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
