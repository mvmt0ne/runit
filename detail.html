<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>runit — Run Detail</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#202020">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="runit">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./transitions.js"></script>
  <style>
    /* ─── phone-inner: bg + theme transition ── */
    .phone-inner {
      background: var(--bg);
      transition: background 0.3s;
    }

    /* ─── Status bar ── */
    .status-bar {
      padding: 18px 28px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-1);
      font-family: 'Space Grotesk', sans-serif;
      transition: color 0.3s;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-icons svg {
      color: var(--text-1);
      transition: color 0.3s;
    }

    /* ─── Back header ── */

    /* ─── Scroll area ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-top: calc(env(safe-area-inset-top, 0px) + 16px);
      padding-bottom: calc(90px + env(safe-area-inset-bottom, 0px));
      scrollbar-width: none;
    }

    .scroll-area::-webkit-scrollbar {
      display: none;
    }

    /* ─── Type badge ── */
    .detail-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border-radius: 0;
      font-size: 11px;
      font-weight: 700;
      margin: 16px 22px 0;
    }

    .detail-type-badge.type-race {
      background: var(--type-race-bg);
      color: var(--type-race-text);
    }

    .detail-type-badge.type-tempo {
      background: var(--type-dark-bg);
      color: var(--type-dark-text);
    }

    .detail-type-badge.type-steady {
      background: var(--type-steady-bg);
      color: var(--type-steady-text);
    }

    .detail-type-badge.type-easy {
      background: var(--type-easy-bg);
      color: var(--type-easy-text);
    }

    .detail-type-badge.type-jogging {
      background: var(--type-jog-bg);
      color: var(--type-jog-text);
    }

    .detail-type-badge.type-long {
      background: var(--type-long-bg);
      color: var(--type-long-text);
    }

    /* ─── Hero ── */
    .detail-hero {
      padding: 12px 22px 0;
    }

    .detail-km {
      font-size: 80px;
      font-weight: 300;
      color: var(--text-1);
      letter-spacing: 0;
      line-height: 1;
      transition: color 0.3s;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
    }

    .detail-km span {
      font-size: 24px;
      font-weight: 300;
      color: var(--text-2);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
    }

    .detail-meta {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 4px;
      transition: color 0.3s;
    }

    /* ─── Stat grid ── */
    .detail-stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--surface-2);
      border-radius: 0;
      overflow: hidden;
      margin: 18px 22px 0;
      transition: background 0.3s;
    }

    .detail-stat-cell {
      background: var(--surface-1);
      padding: 14px 10px;
      text-align: center;
      transition: background 0.3s;
    }

    .dsc-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 5px;
      transition: color 0.3s;
    }

    .dsc-value {
      font-size: 20px;
      font-weight: 300;
      color: var(--text-1);
      letter-spacing: 0;
      transition: color 0.3s;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
    }

    .dsc-value.accent {
      color: var(--accent);
    }

    /* ─── Pace chart ── */
    .detail-pace-chart {
      margin: 14px 22px 0;
      background: var(--surface-1);
      border-radius: 0;
      padding: 16px;
      transition: background 0.3s;
    }

    .chart-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 14px;
      transition: color 0.3s;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 80px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .bar {
      width: 100%;
      border-radius: 0;
    }

    .bar.accent-bar {
      background: var(--accent);
    }

    .bar-label {
      font-size: 10px;
      color: var(--text-3);
      transition: color 0.3s;
    }

    /* ─── Heart rate zones ── */
    .hr-section {
      margin: 14px 22px 0;
      background: var(--surface-1);
      border-radius: 0;
      padding: 16px;
      transition: background 0.3s;
    }

    .hr-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .hr-row:last-child {
      margin-bottom: 0;
    }

    .hr-zone-label {
      font-size: 11px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-3);
      width: 24px;
      flex-shrink: 0;
      transition: color 0.3s;
    }

    .hr-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--surface-2);
      border-radius: 0;
      overflow: hidden;
    }

    .hr-bar {
      height: 100%;
      border-radius: 0;
    }

    .hr-pct {
      font-size: 12px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-2);
      width: 32px;
      text-align: right;
      flex-shrink: 0;
      transition: color 0.3s;
    }

    /* ─── Split table ── */
    .split-section {
      margin: 14px 22px 0;
      background: var(--surface-1);
      border-radius: 0;
      overflow: hidden;
      transition: background 0.3s;
    }

    .split-header {
      display: grid;
      grid-template-columns: 40px 1fr 80px 80px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(128, 128, 128, 0.1);
    }

    .split-header span {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-3);
      transition: color 0.3s;
    }

    .split-row {
      display: grid;
      grid-template-columns: 40px 1fr 80px 80px;
      padding: 11px 14px;
      border-bottom: 1px solid rgba(128, 128, 128, 0.06);
    }

    .split-row:last-child {
      border-bottom: none;
    }

    .split-km {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-3);
      font-family: 'Space Grotesk', sans-serif;
      transition: color 0.3s;
    }

    .split-pace {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
      font-family: 'Space Grotesk', sans-serif;
      transition: color 0.3s;
    }

    .split-pace.fast {
      color: var(--accent);
    }

    .split-hr {
      font-size: 13px;
      color: var(--text-2);
      font-family: 'Space Grotesk', sans-serif;
      text-align: right;
      transition: color 0.3s;
    }

    .split-bar-cell {
      display: flex;
      align-items: center;
      padding-right: 8px;
    }

    .split-mini-bar {
      height: 4px;
      background: var(--accent);
      border-radius: 0;
      opacity: 0.6;
    }

    /* ─── Note ── */
    .detail-note {
      margin: 14px 22px 0;
      background: var(--surface-1);
      border-radius: 0;
      padding: 16px;
      transition: background 0.3s;
    }

    .detail-note-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 6px;
      transition: color 0.3s;
    }

    .detail-note-text {
      font-size: 14px;
      color: var(--text-2);
      font-style: italic;
      transition: color 0.3s;
    }

    /* ─── Shift5 Data Readout Override ── */
    .status-time,
    .detail-km, .detail-km span,
    .dsc-value,
    .hr-pct,
    .split-hr, .split-km, .split-pace, .split-pace.fast {
      font-family: 'Space Mono', ui-monospace, monospace;
      font-feature-settings: "tnum";
    }

    /* ─── Shift5 Label Tracking ── */
    .chart-label, .detail-note-label, .dsc-label,
    .split-header span {
      letter-spacing: 0.14em;
      font-family: 'Space Mono', ui-monospace, monospace;
      font-weight: 400;
    }
  </style>
</head>

<body>
  <div class="phone">
    <div class="phone-inner">



      <div class="scroll-area">

        <div class="detail-type-badge type-race">
          <span>RACE</span>
        </div>

        <div class="detail-hero">
          <div class="detail-km">21.1<span>K</span></div>

        <div class="detail-stats-row">
          <div class="detail-stat-cell">
            <div class="dsc-label">Duration</div>

          <div class="detail-stat-cell">

            </div>
            <div class="bar-col">

              <div class="bar-label">10</div>
            </div>
            <div class="bar-col">
              <div class="bar accent-bar" style="height:75%"></div>
              <div class="bar-label">13</div>
            </div>
            <div class="bar-col">
              <div class="bar accent-bar" style="height:80%"></div>
              <div class="bar-label">16</div>
            </div>
            <div class="bar-col">

        <!-- Heart rate zones -->
        <div class="hr-section">

          <div class="hr-row">
            <span class="hr-zone-label">Z2</span>
            <div class="hr-bar-wrap">
              <div class="hr-bar" style="width:18%; background:#4fc3f7"></div>
            </div>
            <span class="hr-pct">18%</span>
          </div>
          <div class="hr-row">
            <span class="hr-zone-label">Z3</span>
            <div class="hr-bar-wrap">
              <div class="hr-bar" style="width:35%; background:#81c784"></div>

            <span class="hr-pct">35%</span>
          </div>
          <div class="hr-row">

          <div class="hr-row">

        </div>

        <!-- Splits -->
        <div class="split-section">
          <div class="split-header">
            <span>K</span>

            <span></span>
          </div>
          <div class="split-row">

        <!-- Note -->
        <div class="detail-note">
          <div class="detail-note-label">Note</div>

        </div>

      </div><!-- /scroll-area -->

    </div><!-- /phone-inner -->
  </div><!-- /phone -->

  <script>
    (function () {
      const THRESHOLD = 80, MAX_PULL = 120, RESIST = 0.45;
      const scrollEl = document.querySelector('.scroll-area');
      const headerH = 0;
      const wrap = document.createElement('div');
      wrap.style.cssText = `position:fixed;top:${headerH}px;left:50%;transform:translateX(-50%) translateY(-52px);width:44px;height:44px;border-radius:0;background:rgba(35,35,35,0.92);backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;z-index:9;pointer-events:none;transition:transform 0.25s cubic-bezier(0.16,1,0.3,1),opacity 0.25s;opacity:0`;
      const icon = document.createElement('div');
      icon.style.cssText = 'display:flex;align-items:center;justify-content:center;';
      icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#cdcdcd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>';
      wrap.appendChild(icon);
      document.body.appendChild(wrap);
      const ks = document.createElement('style');
      ks.textContent = '@keyframes ptr-spin{to{transform:rotate(360deg)}}';
      document.head.appendChild(ks);
      if (sessionStorage.getItem('ptr-return')) {
        sessionStorage.removeItem('ptr-return');
        if (scrollEl) { scrollEl.style.transition = 'none'; scrollEl.style.transform = 'translateY(64px)'; }
        setTimeout(() => { if (scrollEl) { scrollEl.style.transition = 'transform 0.5s cubic-bezier(0.16,1,0.3,1)'; scrollEl.style.transform = ''; } }, 50);
      }
      let startY = 0, pullDist = 0, tracking = false, triggered = false;
      function scrollTop() { const el = document.querySelector('.scroll-area,.list-scroll'); return el ? el.scrollTop : window.scrollY; }
      function setPos(p, o) {
        const ty = (p / THRESHOLD) * 52 - 52;
        wrap.style.transform = `translateX(-50%) translateY(${ty}px)`;
        wrap.style.opacity = o;
        icon.style.transform = `rotate(${Math.min(p / THRESHOLD, 1) * 210}deg)`;
        if (scrollEl) scrollEl.style.transform = `translateY(${Math.max(0, p * 0.8)}px)`;
      }
      document.addEventListener('touchstart', e => { if (triggered || scrollTop() > 2) return; startY = e.touches[0].clientY; pullDist = 0; tracking = true; wrap.style.transition = 'none'; icon.style.transition = 'none'; if (scrollEl) scrollEl.style.transition = 'none'; }, { passive: true });
      document.addEventListener('touchmove', e => { if (!tracking) return; if (scrollTop() > 2) { tracking = false; return; } const dy = e.touches[0].clientY - startY; if (dy <= 0) return; pullDist = Math.min(dy * RESIST, MAX_PULL); setPos(pullDist, Math.min(pullDist / THRESHOLD, 1)); }, { passive: true });
      document.addEventListener('touchend', () => { if (!tracking) return; tracking = false; const ease = 'transform 0.25s cubic-bezier(0.16,1,0.3,1),opacity 0.25s'; wrap.style.transition = ease; icon.style.transition = 'transform 0.25s'; if (scrollEl) scrollEl.style.transition = 'transform 0.25s cubic-bezier(0.16,1,0.3,1)'; if (pullDist >= THRESHOLD) { triggered = true; wrap.style.transform = 'translateX(-50%) translateY(8px)'; wrap.style.opacity = '1'; if (scrollEl) scrollEl.style.transform = 'translateY(64px)'; icon.style.transform = 'none'; icon.style.transition = 'none'; icon.style.animation = 'ptr-spin 0.55s linear infinite'; sessionStorage.setItem('ptr-return', '1'); setTimeout(() => window.location.reload(), 700); } else { wrap.style.transform = 'translateX(-50%) translateY(-52px)'; wrap.style.opacity = '0'; if (scrollEl) scrollEl.style.transform = ''; } pullDist = 0; }, { passive: true });
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>

</html>
