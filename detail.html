<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>runit — Run Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─── Tokens ── */
    :root, [data-theme="light"] {
      --bg: #ACACAC;
      --surface-1: #BCBCBC;
      --surface-2: #A2A2A2;
      --surface-3: #989898;
      --accent: #9CFD32;
      --text-1: #1A1A1A;
      --text-2: #505050;
      --text-3: #888888;
      --type-race-bg: #000000;
      --type-race-text: #9CFD2E;
      --type-dark-bg: #9CFD35;
      --type-dark-text: #000000;
      --type-steady-bg: #515151;
      --type-steady-text: #FFFFFF;
      --type-easy-bg: #c2c2c2;
      --type-easy-text: #191919;
      --type-jog-bg: #767676;
      --type-jog-text: #191919;
      --type-long-bg: #9CFD32;
      --type-long-text: #191919;
    }
    [data-theme="dark"] {
      --bg: #191919;
      --surface-1: #171910;
      --surface-2: #202216;
      --surface-3: #2B2E1E;
      --accent: #9CFD32;
      --text-1: #F0F0EB;
      --text-2: #7A7A72;
      --text-3: #3E3E38;
    }

    body {
      background: var(--bg);
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
      margin: 0; padding: 0;
      width: 100vw; height: 100dvh;
      overflow: hidden;
      transition: background 0.3s;
    }

    .phone { width: 100%; background: transparent; padding: 0; }
    .phone-inner {
      background: var(--bg);
      overflow: hidden;
      width: 100%; height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      display: flex; flex-direction: column;
      transition: background 0.3s;
    }

    /* ─── Status bar ── */
    .status-bar {
      padding: 18px 28px 0;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .status-time {
      font-size: 15px; font-weight: 600;
      color: var(--text-1); font-family: 'Urbanist', sans-serif;
      transition: color 0.3s;
    }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .status-icons svg { color: var(--text-1); transition: color 0.3s; }

    /* ─── Back header ── */
    .back-header {
      padding: 18px 22px 0;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
      background: rgba(25, 25, 25, 0.08);
      backdrop-filter: blur(12px) saturate(150%);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      z-index: 10;
    }

    [data-theme="light"] .back-header {
      background: rgba(172, 172, 172, 0.06);
    }
    .back-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--surface-1); border: none; cursor: pointer;
      font-size: 18px; color: var(--text-1);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, color 0.3s;
    }
    .back-title {
      font-size: 15px; font-weight: 700;
      color: var(--text-1); letter-spacing: 0;
      transition: color 0.3s;
    }

    /* ─── Scroll area ── */
    .scroll-area {
      flex: 1; overflow-y: auto; padding-bottom: 40px;
      padding-top: 60px;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ─── Type badge ── */
    .detail-type-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 100px;
      font-size: 11px; font-weight: 700;
      margin: 16px 22px 0;
    }
    .detail-type-badge.type-race  { background: var(--type-race-bg);   color: var(--type-race-text); }
    .detail-type-badge.type-tempo { background: var(--type-dark-bg);   color: var(--type-dark-text); }
    .detail-type-badge.type-steady{ background: var(--type-steady-bg); color: var(--type-steady-text); }
    .detail-type-badge.type-easy  { background: var(--type-easy-bg);   color: var(--type-easy-text); }
    .detail-type-badge.type-jogging{ background: var(--type-jog-bg);   color: var(--type-jog-text); }
    .detail-type-badge.type-long  { background: var(--type-long-bg);   color: var(--type-long-text); }

    /* ─── Hero ── */
    .detail-hero { padding: 12px 22px 0; }
    .detail-km {
      font-size: 80px; font-weight: 300; color: var(--text-1);
      letter-spacing: 0; line-height: 1; transition: color 0.3s;
      font-family: 'Urbanist', -apple-system, sans-serif;
    }
    .detail-km span { font-size: 24px; font-weight: 300; color: var(--text-2); font-family: 'Urbanist', -apple-system, sans-serif; }
    .detail-meta { font-size: 13px; color: var(--text-2); margin-top: 4px; transition: color 0.3s; }

    /* ─── Stat grid ── */
    .detail-stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--surface-2);
      border-radius: 16px; overflow: hidden;
      margin: 18px 22px 0; transition: background 0.3s;
    }
    .detail-stat-cell {
      background: var(--surface-1); padding: 14px 10px;
      text-align: center; transition: background 0.3s;
    }
    .dsc-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0;
      text-transform: uppercase; color: var(--text-3);
      margin-bottom: 5px; transition: color 0.3s;
    }
    .dsc-value {
      font-size: 20px; font-weight: 300; color: var(--text-1);
      letter-spacing: 0; transition: color 0.3s;
      font-family: 'Urbanist', -apple-system, sans-serif;
    }
    .dsc-value.accent { color: var(--accent); }

    /* ─── Pace chart ── */
    .detail-pace-chart {
      margin: 14px 22px 0; background: var(--surface-1);
      border-radius: 16px; padding: 16px; transition: background 0.3s;
    }
    .chart-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0;
      text-transform: uppercase; color: var(--text-3);
      margin-bottom: 14px; transition: color 0.3s;
    }
    .bar-chart {
      display: flex; align-items: flex-end; gap: 6px; height: 80px;
    }
    .bar-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .bar { width: 100%; border-radius: 6px 6px 0 0; }
    .bar.accent-bar { background: var(--accent); }
    .bar-label { font-size: 10px; color: var(--text-3); transition: color 0.3s; }

    /* ─── Heart rate zones ── */
    .hr-section {
      margin: 14px 22px 0; background: var(--surface-1);
      border-radius: 16px; padding: 16px; transition: background 0.3s;
    }
    .hr-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .hr-row:last-child { margin-bottom: 0; }
    .hr-zone-label {
      font-size: 11px; font-weight: 700;
      font-family: 'Urbanist', sans-serif;
      color: var(--text-3); width: 24px; flex-shrink: 0;
      transition: color 0.3s;
    }
    .hr-bar-wrap { flex: 1; height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
    .hr-bar { height: 100%; border-radius: 3px; }
    .hr-pct {
      font-size: 12px; font-weight: 600;
      font-family: 'Urbanist', sans-serif;
      color: var(--text-2); width: 32px; text-align: right; flex-shrink: 0;
      transition: color 0.3s;
    }

    /* ─── Split table ── */
    .split-section {
      margin: 14px 22px 0; background: var(--surface-1);
      border-radius: 16px; overflow: hidden; transition: background 0.3s;
    }
    .split-header {
      display: grid; grid-template-columns: 40px 1fr 80px 80px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(128,128,128,0.1);
    }
    .split-header span {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      color: var(--text-3); transition: color 0.3s;
    }
    .split-row {
      display: grid; grid-template-columns: 40px 1fr 80px 80px;
      padding: 11px 14px;
      border-bottom: 1px solid rgba(128,128,128,0.06);
    }
    .split-row:last-child { border-bottom: none; }
    .split-km {
      font-size: 13px; font-weight: 700; color: var(--text-3);
      font-family: 'Urbanist', sans-serif; transition: color 0.3s;
    }
    .split-pace {
      font-size: 14px; font-weight: 700; color: var(--text-1);
      font-family: 'Urbanist', sans-serif; transition: color 0.3s;
    }
    .split-pace.fast { color: var(--accent); }
    .split-hr {
      font-size: 13px; color: var(--text-2);
      font-family: 'Urbanist', sans-serif; text-align: right;
      transition: color 0.3s;
    }
    .split-bar-cell { display: flex; align-items: center; padding-right: 8px; }
    .split-mini-bar { height: 4px; background: var(--accent); border-radius: 2px; opacity: 0.6; }

    /* ─── Note ── */
    .detail-note {
      margin: 14px 22px 0; background: var(--surface-1);
      border-radius: 16px; padding: 16px; transition: background 0.3s;
    }
    .detail-note-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0;
      text-transform: uppercase; color: var(--text-3);
      margin-bottom: 6px; transition: color 0.3s;
    }
    .detail-note-text {
      font-size: 14px; color: var(--text-2);
      font-style: italic; transition: color 0.3s;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="phone-inner">

      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <svg width="24" height="11" viewBox="0 0 24 11">
            <rect x="0" y="1" width="20" height="9" rx="2.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/>
            <rect x="1.5" y="2.5" width="14" height="6" rx="1.5" fill="currentColor"/>
            <path d="M21.5 4v3a1.5 1.5 0 000-3z" fill="currentColor" opacity="0.4"/>
          </svg>
        </div>
      </div>

      <div class="back-header">
        <button class="back-btn" onclick="history.back()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="back-title">April 11</span>
        <div style="width:34px"></div>
      </div>

      <div class="scroll-area">

        <div class="detail-type-badge type-race">
          <span>RACE</span>
        </div>

        <div class="detail-hero">
          <div class="detail-km">21.1<span>km</span></div>
          <div class="detail-meta">Half Marathon · 8:00 AM</div>
        </div>

        <div class="detail-stats-row">
          <div class="detail-stat-cell">
            <div class="dsc-label">Duration</div>
            <div class="dsc-value">1:46:22</div>
          </div>
          <div class="detail-stat-cell">
            <div class="dsc-label">Avg Pace</div>
            <div class="dsc-value accent">5:02</div>
          </div>
          <div class="detail-stat-cell">
            <div class="dsc-label">Calories</div>
            <div class="dsc-value">1,240</div>
          </div>
        </div>

        <!-- Pace chart -->
        <div class="detail-pace-chart">
          <div class="chart-label">Pace / km</div>
          <div class="bar-chart">
            <div class="bar-col"><div class="bar accent-bar" style="height:55%"></div><div class="bar-label">1</div></div>
            <div class="bar-col"><div class="bar accent-bar" style="height:60%"></div><div class="bar-label">3</div></div>
            <div class="bar-col"><div class="bar accent-bar" style="height:65%"></div><div class="bar-label">5</div></div>
            <div class="bar-col"><div class="bar accent-bar" style="height:70%"></div><div class="bar-label">7</div></div>
            <div class="bar-col"><div class="bar accent-bar" style="height:72%"></div><div class="bar-label">10</div></div>
            <div class="bar-col"><div class="bar accent-bar" style="height:75%"></div><div class="bar-label">13</div></div>
            <div class="bar-col"><div class="bar accent-bar" style="height:80%"></div><div class="bar-label">16</div></div>
            <div class="bar-col"><div class="bar accent-bar" style="height:100%"></div><div class="bar-label">21</div></div>
          </div>
        </div>

        <!-- Heart rate zones -->
        <div class="hr-section">
          <div class="chart-label">Heart Rate Zones</div>
          <div class="hr-row">
            <span class="hr-zone-label">Z1</span>
            <div class="hr-bar-wrap"><div class="hr-bar" style="width:5%; background:#64b5f6"></div></div>
            <span class="hr-pct">5%</span>
          </div>
          <div class="hr-row">
            <span class="hr-zone-label">Z2</span>
            <div class="hr-bar-wrap"><div class="hr-bar" style="width:18%; background:#4fc3f7"></div></div>
            <span class="hr-pct">18%</span>
          </div>
          <div class="hr-row">
            <span class="hr-zone-label">Z3</span>
            <div class="hr-bar-wrap"><div class="hr-bar" style="width:35%; background:#81c784"></div></div>
            <span class="hr-pct">35%</span>
          </div>
          <div class="hr-row">
            <span class="hr-zone-label">Z4</span>
            <div class="hr-bar-wrap"><div class="hr-bar" style="width:32%; background:#ffb74d"></div></div>
            <span class="hr-pct">32%</span>
          </div>
          <div class="hr-row">
            <span class="hr-zone-label">Z5</span>
            <div class="hr-bar-wrap"><div class="hr-bar" style="width:10%; background:#e57373"></div></div>
            <span class="hr-pct">10%</span>
          </div>
        </div>

        <!-- Splits -->
        <div class="split-section">
          <div class="split-header">
            <span>km</span>
            <span>Pace</span>
            <span style="text-align:right">BPM</span>
            <span></span>
          </div>
          <div class="split-row">
            <span class="split-km">1</span>
            <span class="split-pace fast">4:55</span>
            <span class="split-hr">158</span>
            <div class="split-bar-cell"><div class="split-mini-bar" style="width:55%"></div></div>
          </div>
          <div class="split-row">
            <span class="split-km">5</span>
            <span class="split-pace">5:01</span>
            <span class="split-hr">163</span>
            <div class="split-bar-cell"><div class="split-mini-bar" style="width:62%"></div></div>
          </div>
          <div class="split-row">
            <span class="split-km">10</span>
            <span class="split-pace">5:04</span>
            <span class="split-hr">167</span>
            <div class="split-bar-cell"><div class="split-mini-bar" style="width:68%"></div></div>
          </div>
          <div class="split-row">
            <span class="split-km">15</span>
            <span class="split-pace">5:08</span>
            <span class="split-hr">170</span>
            <div class="split-bar-cell"><div class="split-mini-bar" style="width:74%"></div></div>
          </div>
          <div class="split-row">
            <span class="split-km">21.1</span>
            <span class="split-pace fast">4:58</span>
            <span class="split-hr">174</span>
            <div class="split-bar-cell"><div class="split-mini-bar" style="width:100%"></div></div>
          </div>
        </div>

        <!-- Note -->
        <div class="detail-note">
          <div class="detail-note-label">Note</div>
          <div class="detail-note-text">네거티브 스플릿. 후반 5km 가장 빠름.</div>
        </div>

      </div><!-- /scroll-area -->

    </div><!-- /phone-inner -->
  </div><!-- /phone -->

  <script>
    const saved = localStorage.getItem('runit-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  </script>
</body>
</html>
